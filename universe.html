<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Work Universe OS — MedStar Portfolio Command</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css' rel='stylesheet' />
  <script src='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js'></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg0:#05070b; --bg1:#090d14; --bg2:#0d1320;
  --glass:rgba(13,19,30,.82); --glass2:rgba(18,26,40,.66); --glassHi:rgba(28,40,60,.5);
  --stroke:rgba(120,160,205,.13); --stroke2:rgba(140,180,225,.26); --hair:rgba(150,190,235,.08);
  --ink:#d9e3ef; --ink2:#8b9cb1; --ink3:#566578;
  --amber:#e8a33d; --amber2:#f6c887; --cyan:#56d6e8; --cyan2:#9fe9f4; --steel:#6ea3cf; --silver:#aebdcd;
  --ok:#3fc492; --warn:#e8a33d; --crit:#ef5a6f; --purple:#9d8cff;
  --mono:"SF Mono","Cascadia Code","JetBrains Mono",Consolas,ui-monospace,monospace;
  --sans:-apple-system,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  --notch:11px; --ease:cubic-bezier(.22,.9,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg0);color:var(--ink);font-family:var(--sans);font-size:13.5px;line-height:1.5;overflow:hidden}
/* engineering grid + ambient field */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
   linear-gradient(rgba(120,170,220,.028) 1px,transparent 1px),
   linear-gradient(90deg,rgba(120,170,220,.028) 1px,transparent 1px),
   radial-gradient(1100px 640px at 72% -12%,rgba(86,214,232,.06),transparent 62%),
   radial-gradient(900px 560px at 6% 112%,rgba(232,163,61,.05),transparent 60%);
  background-size:30px 30px,30px 30px,auto,auto}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;mix-blend-mode:overlay;opacity:.5;
  background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.012) 3px 4px)}
::selection{background:rgba(232,163,61,.3)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1b2533;border:2px solid var(--bg0);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:#2c3d52}
a{color:var(--cyan);text-decoration:none}
a:hover{text-shadow:0 0 9px rgba(86,214,232,.5)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:var(--mono);font-size:12.5px;color:var(--ink);background:#0a0f18;border:1px solid var(--stroke);padding:8px 11px;outline:none;transition:border-color .15s,box-shadow .15s;border-radius:2px}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(86,214,232,.25),0 0 14px rgba(86,214,232,.12)}
textarea{resize:vertical;min-height:90px;line-height:1.55;font-family:var(--sans)}
kbd{font-family:var(--mono);font-size:9.5px;color:var(--ink3);border:1px solid var(--stroke);padding:2px 6px;border-radius:2px}

/* ================= SHELL ================= */
#shell{display:grid;grid-template-columns:212px 1fr;grid-template-rows:56px 1fr;height:100vh;position:relative;z-index:1}
#topbar{grid-column:1/3;display:flex;align-items:center;gap:14px;padding:0 14px;border-bottom:1px solid var(--stroke);
  background:linear-gradient(180deg,rgba(13,19,30,.96),rgba(8,12,19,.92));backdrop-filter:blur(12px);position:relative}
#topbar::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(86,214,232,.5),rgba(232,163,61,.5),transparent);opacity:.55}
#brand{display:flex;align-items:center;gap:10px;min-width:196px}
#brand .mark{width:26px;height:26px;position:relative;flex:none}
#brand .mark::before,#brand .mark::after{content:"";position:absolute;inset:0;border:1.5px solid var(--amber);clip-path:polygon(0 0,100% 0,100% 65%,65% 100%,0 100%)}
#brand .mark::after{inset:6px;border-color:var(--cyan);animation:markspin 9s linear infinite}
@keyframes markspin{to{transform:rotate(360deg)}}
#brand .sig{font-family:var(--mono);font-size:14px;font-weight:800;letter-spacing:.18em;color:var(--ink)}
#brand .sig b{color:var(--amber)}
#brand .sub{font-family:var(--mono);font-size:9px;letter-spacing:.26em;color:var(--ink3);text-transform:uppercase;display:block;margin-top:1px}
#sysline{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase}
#clock{color:var(--cyan2);text-shadow:0 0 10px rgba(86,214,232,.35)}
#alertbeacon{display:flex;align-items:center;gap:6px;cursor:pointer}
#alertbeacon .led{animation:ledblink 1.4s infinite}
#gsearch{flex:1;max-width:640px;position:relative}
#gsearch input{width:100%;background:rgba(7,11,17,.9);border:1px solid var(--stroke);padding:9px 64px 9px 34px;font-size:12.5px;clip-path:polygon(var(--notch) 0,100% 0,100% calc(100% - var(--notch)),calc(100% - var(--notch)) 100%,0 100%,0 var(--notch))}
#gsearch .ico{position:absolute;left:11px;top:8px;color:var(--cyan);font-size:14px}
#gsearch kbd{position:absolute;right:10px;top:8px}
#topbtns{display:flex;gap:8px;align-items:center;margin-left:auto}
.tbtn{display:flex;align-items:center;gap:7px;background:var(--glass2);border:1px solid var(--stroke);color:var(--silver);padding:7px 13px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.tbtn:hover{border-color:var(--cyan);color:var(--cyan2);box-shadow:0 0 16px rgba(86,214,232,.15)}
.tbtn.amber{border-color:rgba(232,163,61,.45);color:var(--amber2)}
.tbtn.amber:hover{box-shadow:0 0 16px rgba(232,163,61,.2)}
.tbtn.mic.on{border-color:var(--crit);color:#f4a9b3;animation:micpulse 1.3s infinite}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,90,111,.35)}50%{box-shadow:0 0 0 8px rgba(239,90,111,0)}}

#nav{background:linear-gradient(180deg,#080c13,#06090e);border-right:1px solid var(--stroke);padding:12px 9px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;position:relative}
#nav::after{content:"";position:absolute;top:0;bottom:0;right:-1px;width:1px;background:linear-gradient(180deg,rgba(86,214,232,.4),transparent 30%,transparent 70%,rgba(232,163,61,.4))}
.navsec{font-family:var(--mono);font-size:8.5px;letter-spacing:.3em;color:var(--ink3);text-transform:uppercase;padding:13px 10px 5px;display:flex;align-items:center;gap:7px}
.navsec::after{content:"";flex:1;height:1px;background:var(--hair)}
.navitem{display:flex;align-items:center;gap:10px;padding:7px 10px;color:var(--ink2);font-family:var(--mono);font-size:11px;letter-spacing:.06em;border-left:2px solid transparent;transition:all .14s var(--ease);cursor:pointer;user-select:none;position:relative}
.navitem:hover{color:var(--ink);background:linear-gradient(90deg,rgba(86,214,232,.07),transparent);border-left-color:rgba(86,214,232,.5)}
.navitem.active{color:var(--amber2);background:linear-gradient(90deg,rgba(232,163,61,.1),transparent);border-left-color:var(--amber)}
.navitem.active::after{content:"";position:absolute;right:8px;width:4px;height:4px;background:var(--amber);box-shadow:0 0 8px var(--amber)}
.navitem .ni{width:16px;text-align:center;opacity:.8}
.navitem .badge{margin-left:auto;font-size:9px;background:rgba(239,90,111,.15);color:#f4a9b3;border:1px solid rgba(239,90,111,.35);padding:0 6px;line-height:15px}
.navitem .badge.zero{display:none}

#main{overflow-y:auto;padding:20px 24px 110px;position:relative}
/* blueprint frame with registration ticks */
#main::before{content:"";position:fixed;top:64px;left:228px;right:14px;bottom:12px;border:1px solid var(--hair);pointer-events:none;z-index:0;
  background:
   linear-gradient(var(--stroke2),var(--stroke2)) 0 0/14px 1px no-repeat, linear-gradient(var(--stroke2),var(--stroke2)) 0 0/1px 14px no-repeat,
   linear-gradient(var(--stroke2),var(--stroke2)) 100% 0/14px 1px no-repeat, linear-gradient(var(--stroke2),var(--stroke2)) 100% 0/1px 14px no-repeat,
   linear-gradient(var(--stroke2),var(--stroke2)) 0 100%/14px 1px no-repeat, linear-gradient(var(--stroke2),var(--stroke2)) 0 100%/1px 14px no-repeat,
   linear-gradient(var(--stroke2),var(--stroke2)) 100% 100%/14px 1px no-repeat, linear-gradient(var(--stroke2),var(--stroke2)) 100% 100%/1px 14px no-repeat}
.view{animation:vwipe .34s var(--ease)}
@keyframes vwipe{from{opacity:0;transform:translateY(10px);clip-path:inset(0 0 14% 0)}to{opacity:1;transform:none;clip-path:inset(0)}}

/* ================= PRIMITIVES ================= */
.eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink3)}
.eyebrow.am{color:var(--amber)} .eyebrow.cy{color:var(--cyan)}
h1.pg{font-size:21px;font-weight:800;letter-spacing:.02em;margin:4px 0 2px;text-transform:uppercase}
.pgsub{color:var(--ink2);font-size:12.5px;margin-bottom:16px;max-width:980px}
.pghead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.pghead .grow{flex:1;min-width:240px}
.panel{position:relative;background:var(--glass);border:1px solid var(--stroke);padding:15px 17px;backdrop-filter:blur(9px);
  clip-path:polygon(var(--notch) 0,100% 0,100% calc(100% - var(--notch)),calc(100% - var(--notch)) 100%,0 100%,0 var(--notch));
  box-shadow:inset 0 1px 0 rgba(180,220,255,.05),0 14px 34px rgba(0,0,0,.4)}
.panel::before{content:"";position:absolute;top:0;left:0;width:var(--notch);height:var(--notch);background:linear-gradient(135deg,var(--stroke2) 0 1px,transparent 1px)}
.panel.rail-a{border-left:2px solid rgba(232,163,61,.55)}
.panel.rail-c{border-left:2px solid rgba(86,214,232,.55)}
.panel.rail-r{border-left:2px solid rgba(239,90,111,.6)}
.panel.tight{padding:11px 13px}
.panel.heads-up{background:linear-gradient(180deg,rgba(20,30,46,.85),rgba(11,17,27,.85))}
.panelhead{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.panelhead .eyebrow{flex:1}
.pid{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;color:var(--ink3);border:1px solid var(--hair);padding:1px 6px}
.grid{display:grid;gap:13px}
.g2{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(192px,1fr))}
.stagger>*{animation:vwipe .4s var(--ease) backwards}
.stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.06s}.stagger>*:nth-child(3){animation-delay:.1s}.stagger>*:nth-child(4){animation-delay:.14s}.stagger>*:nth-child(5){animation-delay:.18s}.stagger>*:nth-child(6){animation-delay:.22s}.stagger>*:nth-child(7){animation-delay:.26s}.stagger>*:nth-child(8){animation-delay:.3s}
.metric{position:relative;background:var(--glass);border:1px solid var(--stroke);padding:13px 15px;cursor:pointer;transition:transform .18s var(--ease),border-color .18s,box-shadow .18s;clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px)}
.metric::after{content:"";position:absolute;left:0;bottom:0;height:2px;width:0;background:linear-gradient(90deg,var(--cyan),var(--amber));transition:width .3s var(--ease)}
.metric:hover{transform:translateY(-2px);border-color:var(--stroke2);box-shadow:0 12px 28px rgba(0,0,0,.45)}
.metric:hover::after{width:100%}
.metric .mv{font-family:var(--mono);font-size:25px;font-weight:800;letter-spacing:-.02em;margin:4px 0 1px;text-shadow:0 0 18px rgba(120,200,255,.12)}
.metric .ml{font-size:11px;color:var(--ink2)}
.metric.crit .mv{color:var(--crit);text-shadow:0 0 16px rgba(239,90,111,.35)} .metric.warn .mv{color:var(--amber2);text-shadow:0 0 16px rgba(232,163,61,.3)} .metric.ok .mv{color:var(--ok)} .metric.info .mv{color:var(--cyan2)}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;border:1px solid var(--stroke2);padding:2px 8px;color:var(--ink2);background:rgba(10,15,23,.7);cursor:pointer;transition:all .14s;white-space:nowrap;clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px)}
.chip:hover{border-color:var(--cyan);color:var(--cyan2);box-shadow:0 0 10px rgba(86,214,232,.18);text-shadow:none}
.chip.t-hospital{color:var(--amber2);border-color:rgba(232,163,61,.4)}
.chip.t-vendor{color:#cabdff;border-color:rgba(157,140,255,.4)}
.chip.t-project{color:var(--cyan2);border-color:rgba(86,214,232,.4)}
.chip.t-risk{color:#f4a9b3;border-color:rgba(239,90,111,.45)}
.chip.t-person{color:#9fe0c8;border-color:rgba(63,196,146,.4)}
.led{width:7px;height:7px;display:inline-block;flex:none;transform:rotate(45deg)}
.led.ok{background:var(--ok);box-shadow:0 0 8px rgba(63,196,146,.7)}
.led.warn{background:var(--warn);box-shadow:0 0 8px rgba(232,163,61,.7)}
.led.crit{background:var(--crit);box-shadow:0 0 9px rgba(239,90,111,.8);animation:ledblink 1.5s infinite}
.led.idle{background:#2e3c4c}
@keyframes ledblink{0%,100%{opacity:1}50%{opacity:.4}}
.stat{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border:1px solid;clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px)}
.stat.ok{color:#86e2bf;border-color:rgba(63,196,146,.45);background:rgba(63,196,146,.08)}
.stat.warn{color:var(--amber2);border-color:rgba(232,163,61,.45);background:rgba(232,163,61,.08)}
.stat.crit{color:#f4a9b3;border-color:rgba(239,90,111,.5);background:rgba(239,90,111,.09)}
.stat.info{color:var(--cyan2);border-color:rgba(86,214,232,.45);background:rgba(86,214,232,.07)}
.stat.idle{color:var(--ink3);border-color:var(--stroke2);background:rgba(60,72,86,.12)}
.btn{position:relative;background:linear-gradient(180deg,#16202f,#101827);border:1px solid var(--stroke2);color:var(--silver);padding:8px 16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;transition:all .16s var(--ease);clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.btn:hover{border-color:var(--cyan);color:#fff;box-shadow:0 0 18px rgba(86,214,232,.18),inset 0 0 14px rgba(86,214,232,.06)}
.btn.primary{background:linear-gradient(180deg,#d3a851,#9c7426);border-color:#e3b765;color:#120d05;font-weight:700}
.btn.primary:hover{box-shadow:0 0 22px rgba(232,163,61,.35)}
.btn.danger{border-color:rgba(239,90,111,.55);color:#f4a9b3}
.btn.sm{padding:5px 10px;font-size:9.5px}
.btn:disabled{opacity:.4;cursor:default}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:7px 10px;border-bottom:1px solid var(--stroke2);position:sticky;top:0;background:rgba(9,13,20,.95);backdrop-filter:blur(6px);z-index:2}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--hair);vertical-align:top}
.tbl tbody tr{transition:background .12s,box-shadow .12s}
.tbl tbody tr:hover{background:linear-gradient(90deg,rgba(86,214,232,.06),transparent 70%);box-shadow:inset 2px 0 0 var(--cyan)}
.tbl td.num,.tbl th.num{text-align:right;font-family:var(--mono)}
.rowlink{cursor:pointer}
.mut{color:var(--ink2)} .mut2{color:var(--ink3)} .mono{font-family:var(--mono)}
.sm{font-size:12px} .xs{font-size:10.5px}
.hr{border:none;border-top:1px solid var(--hair);margin:12px 0}
.empty{color:var(--ink3);font-size:12px;padding:18px 8px;font-family:var(--mono);letter-spacing:.04em;text-align:center;border:1px dashed var(--hair);margin:4px 0}
.empty::before{content:"⌁ ";color:var(--cyan)}
.flexr{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.right{margin-left:auto}
.pillrow{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:9px;color:var(--ink3);border:1px dashed var(--stroke2);padding:1px 7px;letter-spacing:.08em;text-transform:uppercase}
.skel{position:relative;overflow:hidden;background:rgba(120,160,205,.06);min-height:14px}
.skel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(160,210,255,.1),transparent);animation:skel 1.1s infinite}
@keyframes skel{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ================= MISSION CONTROL LAYOUT ================= */
.mc{display:grid;grid-template-columns:265px 1fr 285px;gap:14px;align-items:start}
.mcrail{display:grid;gap:13px;align-content:start}
.mcbottom{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-top:14px}
@media(max-width:1280px){.mc{grid-template-columns:1fr 1fr}.mc .mccenter{grid-column:1/3;order:-1}}
.feeditem{display:flex;gap:9px;padding:5px 0;border-bottom:1px solid var(--hair);font-size:11.5px;align-items:baseline}
.feeditem .ft{font-family:var(--mono);font-size:9px;color:var(--ink3);min-width:52px}
.ticker{overflow:hidden;position:relative;height:22px}
.ticker .tk{position:absolute;white-space:nowrap;font-family:var(--mono);font-size:10px;color:var(--ink2);animation:tick 38s linear infinite}
@keyframes tick{from{transform:translateX(100%)}to{transform:translateX(-100%)}}

/* ================= UNIVERSE MAP ================= */
#umap{position:relative;height:430px;background:radial-gradient(640px 380px at 50% 46%,rgba(20,32,52,.55),rgba(5,8,12,.2));border:1px solid var(--stroke);clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);overflow:hidden}
#umap svg{width:100%;height:100%}
.orbitring{fill:none;stroke:rgba(120,170,220,.1);stroke-dasharray:2 7}
.ucore{cursor:pointer}
.ucore .c1{fill:rgba(232,163,61,.12);stroke:var(--amber);stroke-width:1.2}
.ucore .c2{fill:none;stroke:rgba(86,214,232,.7);stroke-width:1;stroke-dasharray:4 9;animation:coreSpin 14s linear infinite;transform-origin:center}
@keyframes coreSpin{to{transform:rotate(360deg)}}
.ucore text{font-family:var(--mono);fill:var(--amber2);font-size:9px;letter-spacing:.22em;text-anchor:middle}
.unode{cursor:pointer;transition:filter .2s}
.unode:hover{filter:drop-shadow(0 0 14px rgba(86,214,232,.5))}
.unode .ring-bg{fill:rgba(10,16,26,.9);stroke:var(--stroke2);stroke-width:1}
.unode .ring-arc{fill:none;stroke-width:3;stroke-linecap:butt;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s var(--ease)}
.unode .ucode{font-family:var(--mono);font-size:9.5px;font-weight:800;letter-spacing:.08em;fill:var(--ink);text-anchor:middle}
.unode .uscore{font-family:var(--mono);font-size:8px;fill:var(--ink3);text-anchor:middle}
.unode.sev-crit .ring-bg{stroke:rgba(239,90,111,.65)}
.unode.sev-warn .ring-bg{stroke:rgba(232,163,61,.6)}
.upulse{fill:none;stroke:var(--cyan);stroke-width:1;opacity:0;pointer-events:none}
.unode.recent .upulse{animation:upulse 2.6s var(--ease) infinite}
@keyframes upulse{0%{opacity:.7;transform:scale(.6)}100%{opacity:0;transform:scale(1.7)}}
.uline{stroke:rgba(120,170,220,.14);stroke-width:1}
.uline.hot{stroke:rgba(86,214,232,.5);stroke-dasharray:3 6;animation:flowdash 1.4s linear infinite}
@keyframes flowdash{to{stroke-dashoffset:-18}}
#uhover{position:absolute;z-index:6;width:238px;pointer-events:none;opacity:0;transition:opacity .15s}
#uhover.on{opacity:1}
#uhover .panel{pointer-events:none}
#umapfoot{position:absolute;left:12px;bottom:9px;font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink3);text-transform:uppercase}

/* ================= RINGS / RADAR / HEAT / PIPELINE ================= */
.ringwrap{display:flex;align-items:center;gap:14px}
.ring{transform:rotate(-90deg)}
.ring .rbg{fill:none;stroke:rgba(120,160,205,.12);stroke-width:7}
.ring .rfg{fill:none;stroke-width:7;stroke-linecap:butt;transition:stroke-dashoffset 1.1s var(--ease)}
.ringlbl .rv{font-family:var(--mono);font-size:24px;font-weight:800}
.ringlbl .rl{font-size:10.5px;color:var(--ink2)}
#radarbox{position:relative}
.radar-sweep{transform-origin:center;animation:coreSpin 5.5s linear infinite}
.rblip{cursor:pointer}
.rblip circle{transition:r .15s}
.rblip:hover circle{r:6}
.rblip text{font-family:var(--mono);font-size:7.5px;fill:var(--ink3)}
.heat{display:grid;gap:3px}
.heatrow{display:grid;grid-template-columns:64px repeat(var(--hc,5),1fr);gap:3px;align-items:center}
.heathead{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;text-align:center}
.heatlbl{font-family:var(--mono);font-size:9.5px;color:var(--ink2)}
.heatcell{height:22px;border:1px solid rgba(120,160,205,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8.5px;color:rgba(230,240,250,.85);transition:transform .12s,box-shadow .12s}
.heatcell:hover{transform:scale(1.12);box-shadow:0 0 12px rgba(86,214,232,.3);z-index:2}
.pipe{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:6px 2px}
.pstage{position:relative;min-width:96px;flex:1;text-align:center;padding:9px 8px 8px;border:1px solid var(--stroke);background:var(--glass2);cursor:pointer;transition:all .15s;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 50%,calc(100% - 12px) 100%,0 100%,12px 50%)}
.pstage+.pstage{margin-left:-6px}
.pstage:hover{border-color:var(--cyan);background:var(--glassHi);z-index:2}
.pstage .pv{font-family:var(--mono);font-size:17px;font-weight:800;color:var(--cyan2)}
.pstage .pl{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;margin-top:2px}
.pstage.hot .pv{color:var(--amber2)}
.pstage.bad .pv{color:var(--crit)}
.pipeline-flow{height:2px;background:repeating-linear-gradient(90deg,var(--cyan) 0 8px,transparent 8px 16px);opacity:.35;animation:pipeflow 1.2s linear infinite;margin:2px 4px 8px}
@keyframes pipeflow{to{background-position:32px 0}}

/* ================= HOSPITAL TILES / PROJECT RADAR ================= */
.htile{position:relative;background:var(--glass);border:1px solid var(--stroke);padding:13px 14px;cursor:pointer;transition:all .18s var(--ease);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.htile:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 16px 34px rgba(0,0,0,.5),0 0 18px rgba(86,214,232,.12)}
.htile .hc{font-family:var(--mono);font-size:12.5px;font-weight:800;letter-spacing:.12em;color:var(--amber2);display:flex;align-items:center;gap:8px}
.htile .pin{margin-left:auto;color:var(--ink3);font-size:12px}
.htile .pin.on{color:var(--amber)}
.htile .hn{font-size:11px;color:var(--ink2);margin:2px 0 9px}
.htile .hstats{display:flex;gap:12px}
.htile .hstat{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.htile .hstat b{display:block;font-size:15px;color:var(--ink);font-weight:800}
.htile .hstat.c b{color:var(--crit)} .htile .hstat.w b{color:var(--amber2)}
.cattile{background:var(--glass2);border:1px solid var(--stroke);padding:11px 12px;cursor:pointer;transition:all .15s var(--ease);clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px)}
.cattile:hover{border-color:var(--amber);box-shadow:0 0 16px rgba(232,163,61,.12)}
.cattile.open{border-color:var(--amber);background:var(--glassHi)}
.catbar{height:4px;background:rgba(120,160,205,.12);margin-top:8px;position:relative;overflow:hidden}
.catbar i{position:absolute;inset:0;right:auto;background:linear-gradient(90deg,var(--cyan),var(--ok));transition:width .8s var(--ease)}

/* ================= INGESTION THEATER ================= */
#dropzone{position:relative;border:1px dashed var(--stroke2);padding:42px 22px;text-align:center;background:rgba(8,13,20,.55);transition:all .2s;cursor:pointer;clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px)}
#dropzone::before{content:"";position:absolute;inset:8px;border:1px solid var(--hair);pointer-events:none}
#dropzone.over{border-color:var(--cyan);background:rgba(86,214,232,.05);box-shadow:inset 0 0 50px rgba(86,214,232,.08)}
#dropzone .dz1{font-family:var(--mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
#dropzone .dz2{color:var(--ink3);font-size:11px;margin-top:6px;font-family:var(--mono)}
.procwrap{position:relative;border:1px solid var(--stroke2);background:#070b11;padding:16px;overflow:hidden;clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}
.procwrap::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(86,214,232,.03) 2px 4px)}
.scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 1.7s ease-in-out infinite;opacity:.85;box-shadow:0 0 12px rgba(86,214,232,.6)}
@keyframes scan{0%{top:6%}50%{top:92%}100%{top:6%}}
.proclog{font-family:var(--mono);font-size:11px;line-height:1.95;color:var(--cyan2);position:relative;max-height:250px;overflow-y:auto}
.proclog .ok{color:var(--ok)} .proclog .dim{color:var(--ink3)} .proclog .am{color:var(--amber2)}
.confbar{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:9.5px;color:var(--ink2);margin:3px 0}
.confbar .cb{flex:1;height:5px;background:rgba(120,160,205,.12);position:relative;max-width:180px}
.confbar .cb i{position:absolute;inset:0;right:auto;background:linear-gradient(90deg,var(--crit),var(--amber),var(--ok));transition:width .8s var(--ease)}
.xplode{position:relative;min-height:240px}
.xplode svg{width:100%;height:240px}
.xnode{cursor:default}
.xnode rect{fill:rgba(13,20,32,.92);stroke:var(--stroke2)}
.xnode text{font-family:var(--mono);font-size:9px;fill:var(--ink)}
.xnode .xt{fill:var(--ink3);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase}
.xline{stroke:rgba(86,214,232,.4);stroke-width:1;stroke-dasharray:4 5;animation:flowdash 1.3s linear infinite}

/* ================= BRAIN / CHAT ================= */
#brainlog{display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 340px);overflow-y:auto;padding:4px 2px}
.msg{max-width:78%;padding:11px 15px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;position:relative}
.msg.user{align-self:flex-end;background:linear-gradient(180deg,#1c2a3c,#15202f);border:1px solid var(--stroke2);clip-path:polygon(10px 0,100% 0,100% 100%,0 100%,0 10px)}
.msg.ai{align-self:flex-start;background:var(--glass);border:1px solid var(--stroke);border-left:2px solid var(--amber);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%)}
.msg.ai .src{margin-top:9px;padding-top:8px;border-top:1px solid var(--hair);display:flex;gap:6px;flex-wrap:wrap}
.msg.sys{align-self:center;font-family:var(--mono);font-size:10px;color:var(--ink3);background:none;border:none}
.thinking{display:inline-flex;gap:4px;align-items:center}
.thinking i{width:5px;height:5px;background:var(--cyan);animation:tb 1.1s infinite;font-style:normal;transform:rotate(45deg)}
.thinking i:nth-child(2){animation-delay:.18s}.thinking i:nth-child(3){animation-delay:.36s}
@keyframes tb{0%,100%{opacity:.25;transform:rotate(45deg) translateY(0)}50%{opacity:1;transform:rotate(45deg) translateY(-3px)}}

/* ================= GRAPH ================= */
#graphwrap{position:relative;border:1px solid var(--stroke);background:radial-gradient(760px 480px at 50% 42%,#0b1422,#05080d);height:calc(100vh - 235px);overflow:hidden;clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}
#graphsvg{width:100%;height:100%}
.gctl{position:absolute;top:12px;left:12px;display:flex;gap:7px;flex-wrap:wrap;z-index:5;max-width:72%}
.glegend{position:absolute;bottom:10px;left:12px;display:flex;gap:10px;flex-wrap:wrap;z-index:5;font-family:var(--mono);font-size:9px;color:var(--ink2);background:rgba(7,11,17,.8);border:1px solid var(--stroke);padding:6px 11px}
.gnode{cursor:pointer}
.gnode text{font-family:var(--mono);font-size:9px;fill:var(--ink2);pointer-events:none}
.gnode.pulse circle{animation:gpulse 2.2s var(--ease) infinite}
@keyframes gpulse{0%,100%{stroke-width:1}50%{stroke-width:4;stroke-opacity:.9}}
.glink{stroke:rgba(126,168,210,.2);stroke-width:1}
.glink.flow{stroke:rgba(86,214,232,.55);stroke-dasharray:4 6;animation:flowdash 1.2s linear infinite}
.glink.path{stroke:var(--amber);stroke-width:2.2;stroke-dasharray:none;filter:drop-shadow(0 0 5px rgba(232,163,61,.7))}
#ginfo{position:absolute;top:12px;right:12px;width:272px;z-index:6}
.gmode{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--cyan2);text-transform:uppercase;background:rgba(7,11,17,.8);border:1px solid var(--stroke);padding:4px 9px}

/* ================= VOICE ORB ================= */
#orbdock{position:fixed;right:22px;bottom:22px;z-index:55;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
#orbsay{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--cyan2);background:rgba(7,11,17,.92);border:1px solid var(--stroke2);padding:6px 12px;max-width:260px;opacity:0;transition:opacity .25s;clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px)}
#orbsay.on{opacity:1}
#orb{width:74px;height:74px;border-radius:50%;position:relative;cursor:pointer;background:radial-gradient(circle at 34% 30%,rgba(120,220,240,.35),rgba(20,40,60,.85) 55%,rgba(6,10,16,.95));border:1px solid rgba(86,214,232,.45);box-shadow:0 0 28px rgba(86,214,232,.22),inset 0 0 22px rgba(86,214,232,.18);transition:box-shadow .25s}
#orb::before{content:"";position:absolute;inset:7px;border-radius:50%;border:1px dashed rgba(86,214,232,.35);animation:coreSpin 11s linear infinite}
#orb .eq{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:3px;opacity:0;transition:opacity .2s}
#orb .eq i{width:3px;height:10px;background:var(--cyan2);animation:eq 0.7s ease-in-out infinite}
#orb .eq i:nth-child(2){animation-delay:.12s;height:18px}#orb .eq i:nth-child(3){animation-delay:.24s;height:13px}#orb .eq i:nth-child(4){animation-delay:.36s;height:19px}
@keyframes eq{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1.25)}}
#orb.idle{animation:breathe 4.5s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
#orb.listening{border-color:var(--crit);box-shadow:0 0 34px rgba(239,90,111,.4),inset 0 0 24px rgba(239,90,111,.25)}
#orb.listening::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(239,90,111,.5);animation:upulse 1.4s ease-out infinite}
#orb.thinking::before{animation-duration:1.2s;border-style:solid;border-color:rgba(86,214,232,.7) transparent rgba(232,163,61,.7) transparent}
#orb.speaking .eq{opacity:1}
#orb.alert{border-color:var(--amber);box-shadow:0 0 34px rgba(232,163,61,.45)}

/* ================= DRAWER ================= */
#drawer{position:fixed;top:56px;right:-440px;bottom:0;width:430px;background:rgba(9,14,22,.97);border-left:1px solid var(--stroke2);z-index:58;transition:right .3s var(--ease);backdrop-filter:blur(12px);display:flex;flex-direction:column}
#drawer.open{right:0;box-shadow:-30px 0 70px rgba(0,0,0,.55)}
#drawer .dhead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--stroke)}
#drawer .dbody{flex:1;overflow-y:auto;padding:13px 16px}

/* ================= TIMELINE HORIZON ================= */
#horizon{position:relative;height:96px;overflow-x:auto;overflow-y:hidden;border:1px solid var(--stroke);background:rgba(7,11,17,.6)}
#horizon svg{height:96px}
.hzx{font-family:var(--mono);font-size:8px;fill:var(--ink3)}
.hzdot{cursor:pointer}
.hzdot:hover circle{r:5}

/* ================= MODAL / SEARCH / TIMELINE / TABS / TOAST ================= */
#modalveil{position:fixed;inset:0;background:rgba(3,5,8,.74);backdrop-filter:blur(4px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:7vh 16px;overflow-y:auto}
#modalveil.open{display:flex}
#modalbox{background:#0b111b;border:1px solid var(--stroke2);padding:20px 22px;width:min(720px,96vw);box-shadow:0 26px 80px rgba(0,0,0,.65);animation:vwipe .2s var(--ease);clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}
.formrow{display:grid;grid-template-columns:150px 1fr;gap:10px;align-items:start;margin-bottom:10px}
.formrow label{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-top:9px}
#sov{position:fixed;inset:0;background:rgba(3,5,8,.76);backdrop-filter:blur(5px);z-index:70;display:none;justify-content:center;padding-top:9vh}
#sov.open{display:flex}
#sbox{width:min(740px,94vw);height:fit-content;max-height:78vh;background:#0a1019;border:1px solid var(--stroke2);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 90px rgba(0,0,0,.7),0 0 40px rgba(86,214,232,.07);clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px)}
#sbox input{border:none;border-bottom:1px solid var(--stroke);background:transparent;padding:15px 18px;font-size:14px;font-family:var(--sans)}
#sres{overflow-y:auto;padding:8px 6px}
.sgrp{font-family:var(--mono);font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink3);padding:10px 14px 4px}
.srow{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:12.5px;border-left:2px solid transparent}
.srow:hover,.srow.sel{background:rgba(86,214,232,.07);border-left-color:var(--cyan)}
.srow .sm2{color:var(--ink3);font-size:10px;margin-left:auto;font-family:var(--mono)}
.tline{position:relative;padding-left:20px}
.tline::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:1px;background:linear-gradient(180deg,var(--cyan),var(--stroke2))}
.tev{position:relative;padding:0 0 12px}
.tev::before{content:"";position:absolute;left:-19px;top:5px;width:8px;height:8px;transform:rotate(45deg);background:var(--steel);border:1px solid var(--bg1)}
.tev.crit::before{background:var(--crit)} .tev.am::before{background:var(--amber)}
.tev .td{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:.08em}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--stroke);margin-bottom:15px;flex-wrap:wrap}
.tab{padding:8px 14px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .14s}
.tab:hover{color:var(--cyan2)}
.tab.active{color:var(--amber2);border-bottom-color:var(--amber);text-shadow:0 0 12px rgba(232,163,61,.4)}
#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:rgba(10,16,25,.97);border:1px solid var(--stroke2);border-left:3px solid var(--cyan);padding:9px 16px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;box-shadow:0 12px 34px rgba(0,0,0,.6);animation:vwipe .2s var(--ease);max-width:480px;clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px)}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--crit)} .toast.am{border-left-color:var(--amber)}

@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
body.no-motion *,body.no-motion *::before,body.no-motion *::after{animation:none!important;transition:none!important}


/* ================= MOBILE ================= */
#menubtn{display:none;align-items:center;background:var(--glass2);border:1px solid var(--stroke);color:var(--silver);padding:7px 11px;font-size:15px;line-height:1;clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px)}
#navveil{display:none;position:fixed;inset:54px 0 0 0;background:rgba(3,5,8,.62);backdrop-filter:blur(2px);z-index:64}
@media (max-width:900px){
  #shell{grid-template-columns:1fr;grid-template-rows:54px 1fr}
  #topbar{grid-column:1;gap:8px;padding:0 10px}
  #menubtn{display:inline-flex}
  #brand{min-width:0}
  #brand .sub{display:none}
  #brand .sig{font-size:12px;letter-spacing:.12em}
  #sysline #clock,#sysline #alertbeacon{display:none}
  #gsearch{max-width:none;min-width:0;flex:1}
  #gsearch kbd{display:none}
  #gsearch input{padding:9px 10px 9px 30px}
  #topbtns{margin-left:0}
  #topbtns .tbtn{display:none}
  #topbtns .tbtn.mic{display:inline-flex;padding:7px 10px}
  #nav{position:fixed;top:54px;bottom:0;left:0;width:min(78vw,280px);transform:translateX(-103%);transition:transform .25s var(--ease);z-index:65;box-shadow:24px 0 60px rgba(0,0,0,.55)}
  body.navopen #nav{transform:none}
  body.navopen #navveil{display:block}
  .navitem{padding:11px 12px;font-size:12px}
  #main{padding:12px 12px 132px}
  #main::before{left:6px;right:6px;top:60px;bottom:8px}
  h1.pg{font-size:17px}
  .pgsub{font-size:12px}
  .mc{grid-template-columns:1fr}
  .mc .mccenter{order:-1;grid-column:auto}
  .mcbottom{grid-template-columns:1fr}
  .mccenter .grid{grid-template-columns:1fr !important}
  #umap{height:330px}
  #uhover{width:200px}
  #drawer{width:100vw;right:-103vw}
  .formrow{grid-template-columns:1fr;gap:4px;margin-bottom:12px}
  .formrow label{padding-top:0}
  input,select,textarea{font-size:16px}
  .panel{overflow-x:auto}
  table.tbl{min-width:540px}
  .heat{overflow-x:auto}
  .heatcell{min-width:26px}
  #orbdock{right:12px;bottom:calc(12px + env(safe-area-inset-bottom,0px))}
  #orb{width:56px;height:56px}
  #orbsay{max-width:62vw}
  .msg{max-width:92%}
  #brainlog{max-height:calc(100vh - 330px)}
  #graphwrap{height:calc(100vh - 250px)}
  .glegend{display:none}
  .toast{max-width:92vw}
}

/* ================= PRINT (unchanged engine) ================= */
#printdock{display:none}
@media print{
  body{overflow:visible;background:#fff;color:#111}
  body::before,body::after,#shell,#toasts,#modalveil,#sov,#orbdock,#drawer{display:none!important}
  #printdock{display:block;font-family:Georgia,"Times New Roman",serif;color:#111;font-size:12pt;line-height:1.5}
  #printdock h1{font-size:20pt;margin:0 0 4pt}
  #printdock h2{font-size:14pt;margin:16pt 0 6pt;border-bottom:1.5pt solid #222;padding-bottom:3pt}
  #printdock h3{font-size:12pt;margin:10pt 0 4pt}
  #printdock table{width:100%;border-collapse:collapse;font-size:10pt;margin:6pt 0}
  #printdock th,#printdock td{border:.75pt solid #555;padding:4pt 6pt;text-align:left;vertical-align:top}
  #printdock th{background:#eee}
  #printdock .cover{text-align:center;padding-top:30vh;page-break-after:always}
  #printdock .pb{page-break-before:always}
  #printdock .src{font-size:9pt;color:#444;font-style:italic}
  #printdock .sigline{margin-top:28pt;border-top:1pt solid #333;width:60%;padding-top:3pt;font-size:10pt}
  #printdock .disc{margin-top:14pt;font-size:9pt;color:#333;border:1pt solid #888;padding:6pt}
}

/* Sidebar collapse */
#shell.nav-collapsed{grid-template-columns:0px 1fr}
#shell.nav-collapsed #nav{width:0;overflow:hidden;padding:0;min-width:0;border-right:none}
#shell.nav-collapsed #navveil{display:none!important}
#navcollapse{background:none;border:none;color:var(--ink2);cursor:pointer;padding:5px 8px;border-radius:5px;font-size:13px;display:flex;align-items:center;gap:6px;transition:color .14s;font-family:var(--mono);letter-spacing:.04em;font-size:11px}
#navcollapse:hover{color:var(--cyan2);background:rgba(255,255,255,.04)}
#navcollapse svg{transition:transform .25s var(--ease)}
#shell.nav-collapsed #navcollapse svg{transform:rotate(180deg)}

</style>
</head>
<body>
<div id="shell">
  <div id="topbar">
    <button id="menubtn" onclick="toggleNav()">☰</button>

<script>
/* =====================================================================
   WORK UNIVERSE OS — Phase 1
   Single-file command center. Storage adapter: window.storage (Claude
   persistent artifact storage) with localStorage fallback for static
   deploys. AI: Anthropic API (key handled inside Claude). Live data:
   optional MCP bridges (Smartsheet / Superhuman Mail / Google Drive).
   ===================================================================== */
"use strict";

/* ============================ UTILITIES ============================ */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid=p=>p+"-"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayISO=()=>new Date().toISOString().slice(0,10);
const nowISO=()=>new Date().toISOString();
const fmtD=d=>{if(!d)return"—";const x=new Date(d+(String(d).length===10?"T12:00:00":""));return isNaN(x)?esc(d):x.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})};
const fmtDT=d=>{const x=new Date(d);return isNaN(x)?"—":x.toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})};
const fmt$=n=>n==null||isNaN(n)?"—":Number(n).toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:2});
const daysFrom=d=>{if(!d)return null;return Math.floor((Date.now()-new Date(d+(String(d).length===10?"T12:00:00":"")).getTime())/86400000)};
const daysUntil=d=>{const x=daysFrom(d);return x==null?null:-x};
const isPast=d=>{const x=daysUntil(d);return x!=null&&x<0};
const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):"";
const toast=(m,k="info")=>{const t=document.createElement("div");t.className="toast "+(k==="ok"?"ok":k==="err"?"err":k==="am"?"am":"");t.textContent=m;$("#toasts").appendChild(t);setTimeout(()=>t.remove(),4200)};
const debounce=(f,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>f(...a),ms)}};

/* ============================ STORAGE ADAPTER ============================ */
/* ============================ CLOUD SYNC (SUPABASE) ============================ */
const CLOUD={
  cfg:null, sess:null, down:false,
  loadCfg(){try{this.cfg=JSON.parse(localStorage.getItem("wuos:cloudcfg")||"null")}catch(e){this.cfg=null}
            try{this.sess=JSON.parse(localStorage.getItem("wuos:cloudsess")||"null")}catch(e){this.sess=null}},
  saveCfg(){try{localStorage.setItem("wuos:cloudcfg",JSON.stringify(this.cfg))}catch(e){}},
  saveSess(){try{localStorage.setItem("wuos:cloudsess",JSON.stringify(this.sess))}catch(e){}},
  ready(){return !!(this.cfg&&this.cfg.url&&this.cfg.key&&this.sess&&this.sess.access_token)},
  base(){return this.cfg.url.replace(/\/+$/,"")},
  exp(){try{return JSON.parse(atob(this.sess.access_token.split(".")[1])).exp*1000}catch(e){return 0}},
  async signIn(email,password){
    const r=await fetch(this.base()+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:this.cfg.key,"Content-Type":"application/json"},body:JSON.stringify({email,password})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(j.error_description||j.msg||"Sign-in failed ("+r.status+")");
    this.sess={access_token:j.access_token,refresh_token:j.refresh_token};this.saveSess();return true},
  async refresh(){
    if(!this.sess||!this.sess.refresh_token)throw new Error("No session");
    const r=await fetch(this.base()+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{apikey:this.cfg.key,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:this.sess.refresh_token})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok){this.sess=null;this.saveSess();throw new Error("Cloud session expired — sign in again in Settings")}
    this.sess={access_token:j.access_token,refresh_token:j.refresh_token};this.saveSess()},
  async ensure(){if(!this.ready())throw new Error("Cloud not connected");if(this.exp()-Date.now()<60000)await this.refresh()},
  async kv(method,key,data){
    await this.ensure();
    const h={apikey:this.cfg.key,Authorization:"Bearer "+this.sess.access_token,"Content-Type":"application/json"};
    let url=this.base()+"/rest/v1/universe_store",opt;
    if(method==="GET"){url+="?key=eq."+encodeURIComponent(key)+"&select=data";opt={headers:h}}
    else if(method==="SET"){url+="?on_conflict=user_id,key";opt={method:"POST",headers:Object.assign({Prefer:"resolution=merge-duplicates,return=minimal"},h),body:JSON.stringify({key,data,updated_at:new Date().toISOString()})}}
    else{url+="?key=eq."+encodeURIComponent(key);opt={method:"DELETE",headers:h}}
    let r=await fetch(url,opt);
    if(r.status===401){await this.refresh();opt.headers.Authorization="Bearer "+this.sess.access_token;r=await fetch(url,opt)}
    if(!r.ok)throw new Error("Cloud "+method+" failed ("+r.status+")");
    if(method==="GET"){const j=await r.json();return j.length?j[0].data:null}
    return true},
  signOut(){this.sess=null;this.saveSess()}
};
let TOASTED={};
function toastOnce(k,msg,cls){if(TOASTED[k])return;TOASTED[k]=1;toast(msg,cls)}
function cloudChip(){const el=$("#cloudchip");if(!el)return;
  if(Store.env==="cloud"&&!CLOUD.down){el.innerHTML='<span class="led ok"></span> CLOUD SYNC'}
  else if(CLOUD.cfg&&CLOUD.sess){el.innerHTML='<span class="led crit"></span> CLOUD DOWN · LOCAL'}
  else if(CLOUD.cfg){el.innerHTML='<span class="led warn"></span> CLOUD: SIGNED OUT'}
  else el.innerHTML='<span class="led idle"></span> '+(Store.hasClaude?"DEVICE STORE":"LOCAL STORE")}
const Store={
  env:"local",
  hasClaude:(typeof window!=="undefined"&&!!window.storage),
  async init(){
    CLOUD.loadCfg();
    if(CLOUD.ready()){
      try{await CLOUD.kv("GET","wuos:ping");this.env="cloud";CLOUD.down=false}
      catch(e){CLOUD.down=true;this.env=this.hasClaude?"claude":"local"}
    } else this.env=this.hasClaude?"claude":"local";
    cloudChip();
  },
  async localGet(k){
    if(this.hasClaude){try{const r=await window.storage.get(k);if(r&&r.value)return JSON.parse(r.value)}catch(e){}}
    try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}
  },
  async localSet(k,s){let ok=false;
    if(this.hasClaude){try{const r=await window.storage.set(k,s);ok=!!r}catch(e){}}
    try{localStorage.setItem(k,s);ok=true}catch(e){}
    return ok},
  async localDel(k){if(this.hasClaude){try{await window.storage.delete(k)}catch(e){}}try{localStorage.removeItem(k)}catch(e){}},
  async get(k){
    if(this.env==="cloud"){
      try{const v=await CLOUD.kv("GET",k);CLOUD.down=false;cloudChip();if(v!=null)return v;return this.localGet(k)}
      catch(e){CLOUD.down=true;cloudChip();toastOnce("cget","Cloud unreachable — reading this device's mirror.","am");return this.localGet(k)}
    }
    return this.localGet(k)
  },
  async set(k,val){
    const s=JSON.stringify(val);
    const localOk=await this.localSet(k,s); /* mirror first — a cloud outage never loses work */
    if(this.env==="cloud"){
      try{await CLOUD.kv("SET",k,val);CLOUD.down=false;cloudChip();return true}
      catch(e){CLOUD.down=true;cloudChip();toastOnce("cset","Cloud save failed — work kept safely on this device. Use Push to Cloud in Settings once it's back.","err");return localOk}
    }
    if(!localOk)toast("Save failed for "+k+" — export a backup from Settings.","err");
    return localOk
  },
  async del(k){if(this.env==="cloud"){try{await CLOUD.kv("DEL",k)}catch(e){}}await this.localDel(k)}
};
function b64toBlob(b64,media){const bin=atob(b64),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:media||"application/octet-stream"})}
async function viewSourceFile(id){
  const r=rec(id);if(!r)return;toast("Loading source file…");
  let f=r.fileB64?{media:r.fileMedia,b64:r.fileB64}:await Store.get("wuos:file:"+id);
  if(!f||!f.b64){toast("Source file not found in storage","am");return}
  try{window.open(URL.createObjectURL(b64toBlob(f.b64,f.media)))}catch(e){toast("Could not open file: "+e.message,"err")}
}
async function cloudConnect(){
  const url=$("#ccUrl").value.trim(),key=$("#ccKey").value.trim(),em=$("#ccEmail").value.trim(),pw=$("#ccPw").value;
  if(!url||!key||!em||!pw){toast("Fill in all four fields first","am");return}
  if(!/^https:\/\//.test(url)){toast("Project URL should start with https://","am");return}
  CLOUD.cfg={url,key,email:em};CLOUD.saveCfg();
  try{await CLOUD.signIn(em,pw)}catch(e){toast(e.message,"err");cloudChip();render();return}
  try{await CLOUD.kv("GET","wuos:ping")}catch(e){toast("Signed in, but the data table isn't ready: "+e.message+". Run the setup SQL in Supabase, then Connect again.","err");cloudChip();render();return}
  Store.env="cloud";CLOUD.down=false;cloudChip();
  const cloudCore=await CLOUD.kv("GET",DB_KEY).catch(()=>null);
  const localCore=await Store.localGet(DB_KEY);
  if(!cloudCore&&localCore){
    if(confirm("Cloud is empty. Upload this device's data to the cloud now?"))await cloudPush();
  } else if(cloudCore){
    if(confirm("Cloud already has data. Load it onto this device now? (This device's current copy stays in its local mirror.)"))await cloudPull();
  }
  toast("Cloud sync connected","ok");render();
}
async function cloudPush(){
  await Store.set(DB_KEY,DB);await Store.set(AUDIT_KEY,AUDIT);await Store.set(SET_KEY,SETTINGS);
  for(const d of DB.documents.filter(x=>x.hasFile)){
    const f=await Store.localGet("wuos:file:"+d.id);
    if(f){try{await CLOUD.kv("SET","wuos:file:"+d.id,f)}catch(e){}}
  }
  toast("Everything pushed to cloud","ok");audit("cloud",null,null,"Pushed full memory to cloud");
}
async function cloudPull(){
  const c=await CLOUD.kv("GET",DB_KEY).catch(e=>{toast(e.message,"err");return null});
  if(!c){toast("Cloud has no data yet — use Push to Cloud first","am");return}
  DB=c;AUDIT=await CLOUD.kv("GET",AUDIT_KEY).catch(()=>null)||[];
  const st=await CLOUD.kv("GET",SET_KEY).catch(()=>null);if(st)SETTINGS=Object.assign(defSettings(),st);
  await Store.localSet(DB_KEY,JSON.stringify(DB));await Store.localSet(AUDIT_KEY,JSON.stringify(AUDIT));await Store.localSet(SET_KEY,JSON.stringify(SETTINGS));
  Object.keys(blankDB()).forEach(k=>{if(DB[k]===undefined)DB[k]=k==="meta"?{}:[]});
  await purgeSeededReqs();
  toast("Pulled latest from cloud","ok");render();
}
function cloudSignOut(){CLOUD.signOut();Store.env=Store.hasClaude?"claude":"local";cloudChip();render();toast("Signed out — running on this device only","am")}

/* ============================ DATABASE ============================ */
const DB_KEY="wuos:core", AUDIT_KEY="wuos:audit", SET_KEY="wuos:settings";
let DB=null, AUDIT=[], SETTINGS=null;
const blankDB=()=>({meta:{version:1,created:nowISO(),seeded:false},
  hospitals:[],projects:[],vendors:[],people:[],emails:[],documents:[],workOrders:[],
  invoices:[],assets:[],risks:[],actions:[],notes:[],deficiencies:[],requirements:[],
  evidence:[],calEvents:[],reports:[],links:[]});
const defSettings=()=>({voice:true,voiceRate:1.0,pinned:[],motion:"auto",mcpSmartsheet:false,mcpMail:false,mcpDrive:false,apiKey:"",model:"claude-sonnet-4-6",mapboxToken:"",googleTTSKey:"",voiceProvider:"auto",googleVoice:"en-US-Neural2-F",convoMode:false,preparedBy:"Antoine W. Riley Sr., Director of Systems Maintenance"});

const saveDB=debounce(async()=>{await Store.set(DB_KEY,DB)},600);
const saveAudit=debounce(async()=>{AUDIT=AUDIT.slice(-1200);await Store.set(AUDIT_KEY,AUDIT)},800);
const saveSettings=()=>Store.set(SET_KEY,SETTINGS);
function audit(action,entityType,entityId,summary,src="user"){
  AUDIT.push({id:uid("ev"),at:nowISO(),action,entityType,entityId,summary,src});saveAudit();
}
function col(type){const m={hospital:"hospitals",project:"projects",vendor:"vendors",person:"people",email:"emails",document:"documents",workorder:"workOrders",invoice:"invoices",asset:"assets",risk:"risks",action:"actions",note:"notes",deficiency:"deficiencies",requirement:"requirements",evidence:"evidence",calevent:"calEvents",report:"reports"};return m[type]}
function rec(id){if(!id)return null;for(const t of Object.keys(ENT)){const c=DB[col(t)];if(!c)continue;const r=c.find(x=>x.id===id);if(r)return r}return null}
function typeOf(id){return id?String(id).split("-")[0].replace(/^h$/,"hospital").replace(/^p$/,"project").replace(/^v$/,"vendor").replace(/^pe$/,"person").replace(/^em$/,"email").replace(/^doc$/,"document").replace(/^wo$/,"workorder").replace(/^inv$/,"invoice").replace(/^as$/,"asset").replace(/^rk$/,"risk").replace(/^ac$/,"action").replace(/^nt$/,"note").replace(/^df$/,"deficiency").replace(/^rq$/,"requirement").replace(/^ev2$/,"evidence").replace(/^ce$/,"calevent").replace(/^rp$/,"report"):null}
const IDP={hospital:"h",project:"p",vendor:"v",person:"pe",email:"em",document:"doc",workorder:"wo",invoice:"inv",asset:"as",risk:"rk",action:"ac",note:"nt",deficiency:"df",requirement:"rq",evidence:"ev2",calevent:"ce",report:"rp"};
function addRec(type,data,src="user"){
  const r=Object.assign({id:uid(IDP[type]),createdAt:nowISO(),updatedAt:nowISO()},data);
  DB[col(type)].push(r);audit("create",type,r.id,r.title||r.name||r.number||r.subject||type,src);saveDB();return r;

function localSearch(q,limit=40){
  q=(q||"").toLowerCase().trim();if(!q)return[];

        if(proxy&&res.status===413)throw new Error("That payload is too large for the site gateway (~3 MB). Ingest this file inside Claude instead.");
        let j=null;try{j=JSON.parse(tx)}catch(e){}
        const m2=j&&j.error?(j.error.message||j.error):null;
        throw new Error(m2||("AI request failed ("+res.status+"). "+tx.slice(0,160)));
      }
      const data=await res.json();
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      const toolCalls=(data.content||[]).filter(b=>b.type==="mcp_tool_use").map(b=>({name:b.name,input:b.input}));
      const toolResults=(data.content||[]).filter(b=>b.type==="mcp_tool_result").map(b=>{try{return b.content&&b.content[0]&&b.content[0].text||""}catch(e){return""}});
      return {text,toolCalls,toolResults,raw:data};
    } finally { if(solo)orbDone() }
  },
  parseJSON(text){
    let t=(text||"").trim().replace(/```json/gi,"```");
    const m=t.match(/```([\s\S]*?)```/);if(m)t=m[1].trim();else t=t.replace(/```/g,"").trim();
    const s=t.indexOf("{");if(s<0)return JSON.parse(t);
    const e=t.lastIndexOf("}");
    const cand=(e>s)?t.slice(s,e+1):t.slice(s);
    try{return JSON.parse(cand);}catch(_){}
    try{return JSON.parse(repairTruncatedJSON(cand));}catch(_){}
    const cut=lastSafeComma(cand);
    if(cut>0){try{return JSON.parse(repairTruncatedJSON(cand.slice(0,cut)));}catch(_){}}
    return JSON.parse(cand);
  },
  async json(messages,opts={}){
    const r=await this.call(messages,opts);
    try{return this.parseJSON(r.text)}catch(e){const t=r.text||"";throw new Error("AI returned unparseable JSON ("+t.length+" chars). START: "+t.slice(0,140)+(t.length>220?"  … END: "+t.slice(-80):""))}
  }
};
function lastSafeComma(t){let inStr=false,escp=false,idx=-1;for(let i=0;i<t.length;i++){const c=t[i];if(inStr){if(escp)escp=false;else if(c==='\\')escp=true;else if(c==='"')inStr=false;}else{if(c==='"')inStr=true;else if(c===',')idx=i;}}return idx;}
function repairTruncatedJSON(t){
  t=(t||"").trim();let inStr=false,escp=false;const stack=[];
  for(let i=0;i<t.length;i++){const c=t[i];
    if(inStr){if(escp)escp=false;else if(c==='\\')escp=true;else if(c==='"')inStr=false;}
    else{if(c==='"')inStr=true;else if(c==='{')stack.push('}');else if(c==='[')stack.push(']');else if(c==='}'||c===']')stack.pop();}}
  let out=t;
  if(inStr)out+='"';
  out=out.replace(/\\+$/,'');
  out=out.replace(/,\s*$/,'');
  out=out.replace(/:\s*$/,':null');
  out=out.replace(/,\s*$/,'');
  for(let i=stack.length-1;i>=0;i--)out+=stack[i];
  return out;
}

async function fileToBlocks(file){
  const name=file.name.toLowerCase();
  const readText=()=>new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=no;r.readAsText(file)});
  const readB64=()=>new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result.split(",")[1]);r.onerror=no;r.readAsDataURL(file)});
  if(file.size>4.2*1024*1024) throw new Error(file.name+" is over 4 MB — split it or paste the relevant section.");
  if(name.endsWith(".csv")||name.endsWith(".tsv")){const t=await readText();return{blocks:[{type:"text",text:t.slice(0,12000)}],text:t}}
  if(name.endsWith(".xlsx")||name.endsWith(".xls")){const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:"array"});let t="";wb.SheetNames.slice(0,3).forEach(sn=>{t+="--- SHEET "+sn+" ---\n"+XLSX.utils.sheet_to_csv(wb.Sheets[sn]).slice(0,9000)+"\n"});return{blocks:[{type:"text",text:t.slice(0,14000)}],text:t}}
  if(file.type.startsWith("image/")){const b64=await readB64();return{blocks:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}}],b64,media:file.type}}
  if(name.endsWith(".pdf")||file.type==="application/pdf"){const b64=await readB64();return{blocks:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}],b64,media:"application/pdf"}}
  const t=await readText();return{blocks:[{type:"text",text:t.slice(0,14000)}],text:t};
}

  if(has(DB.risks,r=>r.status==="Open")||has(DB.actions,a=>a.status==="Open"&&isPast(a.due))||has(DB.invoices,i=>!["Paid","Archived"].includes(i.status)&&isPast(i.dueDate)))return"warn";

function recsEngine(){
  const recs=[];
  DB.projects.filter(p=>p.status==="Active"&&daysFrom(p.updatedAt)>14).forEach(p=>recs.push({sev:"warn",text:"No update in "+daysFrom(p.updatedAt)+" days: "+nameOf(p),id:p.id}));
  DB.actions.filter(a=>a.status==="Open"&&isPast(a.due)).forEach(a=>recs.push({sev:"crit",text:"Overdue action ("+fmtD(a.due)+"): "+a.title,id:a.id}));
  DB.actions.filter(a=>a.status==="Open"&&!a.owner).forEach(a=>recs.push({sev:"warn",text:"Action has no owner: "+a.title,id:a.id}));
  openWOs().filter(w=>isPast(w.due)).forEach(w=>recs.push({sev:"crit",text:"Overdue WO #"+(w.number||"—")+": "+nameOf(w),id:w.id}));
  openInvs().filter(i=>isPast(i.dueDate)).forEach(i=>recs.push({sev:"crit",text:"Invoice past due — "+(i.vendorName||"vendor")+" "+fmt$(i.amount),id:i.id}));
  DB.invoices.filter(i=>(i.flags||[]).includes("Possible duplicate")&&i.status!=="Archived").forEach(i=>recs.push({sev:"warn",text:"Possible duplicate invoice #"+(i.number||"—")+" ("+(i.vendorName||"")+")",id:i.id}));
  DB.risks.filter(r=>r.status==="Open"&&r.severity==="critical").forEach(r=>recs.push({sev:"crit",text:"Critical risk open: "+r.title,id:r.id}));
  DB.requirements.filter(q=>["Overdue","Expired"].includes(q.status)).slice(0,6).forEach(q=>{const h=hospOf(q.id);recs.push({sev:"crit",text:(h?h.code+" — ":"")+q.title+" is "+q.status.toLowerCase(),id:q.id})});

  recs.sort((a,b)=>(b.sev==="crit")-(a.sev==="crit"));return recs;
}

function getHospitalHealth(code) {
  const hosp = (DB.hospitals||[]).find(h => h.code === code || h.name?.includes(code));
  if (!hosp) return {score:null, label:"No Data", color:"var(--ink3)"};
  const projects = (DB.projects||[]).filter(p => p.hospitalId === hosp.id || p.siteId === hosp.id);
  if (!projects.length) return {score:null, label:"No Data", color:"var(--ink3)"};
  const total = projects.length;
  const done = projects.filter(p => p.status === "complete" || p.status === "done").length;
  const stalled = projects.filter(p => p.status === "stalled" || p.status === "blocked" || p.status === "overdue").length;
  const score = Math.round((done / total) * 100);
  if (stalled > 0) return {score, label:"At Risk", color:"var(--crit)"};
  if (score >= 70) return {score, label:"Healthy", color:"var(--ok)"};
  if (score >= 40) return {score, label:"Watch", color:"var(--warn)"};
  return {score, label:"At Risk", color:"var(--crit)"};
}

function opsMapInit(containerId) {
  const token = ((SETTINGS&&SETTINGS.mapboxToken)||localStorage.getItem("ops_mapbox_token")||"").trim();
  if (!token) return;
  if (typeof mapboxgl === "undefined") return;
  if (window._opsMap) { window._opsMap.remove(); window._opsMap = null; window._opsMapMarkers = {}; }
  
  mapboxgl.accessToken = token;
  const map = new mapboxgl.Map({
    container: containerId,
    style: "mapbox://styles/mapbox/dark-v11",
    center: [-76.9, 38.9],
    zoom: 7.5,
    attributionControl: false,
  });
  map.addControl(new mapboxgl.NavigationControl({showCompass: false}), "top-right");
  map.addControl(new mapboxgl.AttributionControl({compact: true}), "bottom-right");
  
  map.on("load", () => {
    MEDSTAR_SITES_GEO.forEach(geo => {
      const ph = getHospitalHealth(geo.code);
      const isHighlighted = !window._opsMapHighlight || window._opsMapHighlight.includes(geo.code);
      
      const el = document.createElement("div");
      el.className = "ops-marker";
      el.style.cssText = `width:14px;height:14px;border-radius:50%;background:${ph.color};border:2px solid rgba(255,255,255,0.4);box-shadow:0 0 10px ${ph.color}88;cursor:pointer;position:relative;opacity:${isHighlighted?1:0.2};transition:all 0.2s`;
      
      const lbl = document.createElement("div");
      lbl.style.cssText = `position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;font-weight:700;color:${isHighlighted?"var(--ink)":"var(--ink3)"};white-space:nowrap;letter-spacing:0.06em;text-shadow:0 1px 4px rgba(0,0,0,0.8);pointer-events:none`;
      lbl.textContent = geo.code;
      el.appendChild(lbl);
      
      el.addEventListener("click", () => {
        window._opsMapSelected = geo.code;
        map.flyTo({center:[geo.lng,geo.lat], zoom:13, duration:1200});
        renderOpsMapDetail(geo.code);
      });
      
      const marker = new mapboxgl.Marker({element:el}).setLngLat([geo.lng, geo.lat]).addTo(map);
      window._opsMapMarkers[geo.code] = {marker, el};
    });
  });

}

function opsMapExecuteCommand(cmd) {
  const map = window._opsMap;
  if (!map) return;
  const geoByCode = Object.fromEntries(MEDSTAR_SITES_GEO.map(g=>[g.code,g]));
  
  if (cmd.action === "flyTo" && cmd.site) {
    const geo = geoByCode[cmd.site];
    if (geo) { map.flyTo({center:[geo.lng,geo.lat],zoom:13,duration:1200}); renderOpsMapDetail(cmd.site); }
  } else if (cmd.action === "showGroup") {
    const dc = ["MWHC","MGUH","MNRH"];
    const balt = ["MUMH","MGSH","MHH","MFSHC"];
    const codes = cmd.group==="dc"?dc:cmd.group==="baltimore"?balt:null;
    window._opsMapHighlight = codes;
    Object.entries(window._opsMapMarkers).forEach(([code,{el}])=>{
      const on = !codes || codes.includes(code);
      el.style.opacity = on?1:0.15;
      el.firstChild.style.color = on?"var(--ink)":"var(--ink3)";
    });
    if (codes) {
      const tgts = MEDSTAR_SITES_GEO.filter(g=>codes.includes(g.code));
      const lngs=tgts.map(g=>g.lng), lats=tgts.map(g=>g.lat);
      map.fitBounds([[Math.min(...lngs)-.08,Math.min(...lats)-.05],[Math.max(...lngs)+.08,Math.max(...lats)+.05]],{padding:60,duration:1200});
    } else { map.flyTo({center:[-76.9,38.9],zoom:7.5,duration:1200}); }
  } else if (cmd.action === "highlight" && cmd.codes) {
    window._opsMapHighlight = cmd.codes;
    Object.entries(window._opsMapMarkers).forEach(([code,{el}])=>{
      const on = cmd.codes.includes(code);
      el.style.opacity = on?1:0.15;
      el.firstChild.style.color = on?"var(--ink)":"var(--ink3)";
    });
    const tgts = MEDSTAR_SITES_GEO.filter(g=>cmd.codes.includes(g.code));
    if (tgts.length===1) { map.flyTo({center:[tgts[0].lng,tgts[0].lat],zoom:12,duration:1200}); renderOpsMapDetail(tgts[0].code); }
    else if (tgts.length>1) {
      const lngs=tgts.map(g=>g.lng), lats=tgts.map(g=>g.lat);
      map.fitBounds([[Math.min(...lngs)-.08,Math.min(...lats)-.05],[Math.max(...lngs)+.08,Math.max(...lats)+.05]],{padding:80,duration:1200});
    }
  } else if (cmd.action === "highlightAll") {
    window._opsMapHighlight = null;
    Object.values(window._opsMapMarkers).forEach(({el})=>{el.style.opacity=1;el.firstChild.style.color="var(--ink)";});
    map.flyTo({center:[-76.9,38.9],zoom:7.5,duration:1200});
  } else if (cmd.action === "filterOverdue") {
    const at_risk = MEDSTAR_SITES_GEO.map(g=>g.code).filter(code=>getHospitalHealth(code).label==="At Risk");
    window._opsMapHighlight = at_risk.length?at_risk:null;
    Object.entries(window._opsMapMarkers).forEach(([code,{el}])=>{
      const on = !at_risk.length || at_risk.includes(code);
      el.style.opacity=on?1:0.15; el.firstChild.style.color=on?"var(--ink)":"var(--ink3)";
    });
    if (at_risk.length) {
      const tgts = MEDSTAR_SITES_GEO.filter(g=>at_risk.includes(g.code));
      const lngs=tgts.map(g=>g.lng), lats=tgts.map(g=>g.lat);
      map.fitBounds([[Math.min(...lngs)-.08,Math.min(...lats)-.05],[Math.max(...lngs)+.08,Math.max(...lats)+.05]],{padding:80,duration:1200});
    }
  } else if (cmd.action === "info" && cmd.site) {
    renderOpsMapDetail(cmd.site);
  }
}

async function opsMapKeraCommand(cmdText, apiKey, model) {
  if (!cmdText.trim() || !apiKey) return "No API key configured.";
  const systemPrompt = `You control an Operations Map showing 10 MedStar hospital sites.
Sites: MWHC(DC), MGUH(DC), MNRH(DC), MUMH(Baltimore), MGSH(Baltimore), MHH(Baltimore), MFSHC(Rosedale MD), MMMC(Olney MD), MSMHC(Clinton MD), MSMH(Leonardtown MD).
Respond with JSON action then a plain-text explanation on the next line.
Actions: {"action":"flyTo","site":"CODE"} | {"action":"showGroup","group":"dc"|"baltimore"|"all"} | {"action":"highlight","codes":["CODE",...]} | {"action":"highlightAll"} | {"action":"filterOverdue"} | {"action":"info","site":"CODE"}`;
  
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:model||"claude-sonnet-4-6",max_tokens:256,system:systemPrompt,messages:[{role:"user",content:cmdText}]})
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text||"";
    const jsonMatch = reply.match(/\{[\s\S]*?\}/);
    const explanation = reply.replace(/\{[\s\S]*?\}/,"").trim();
    if (jsonMatch) {
      try { opsMapExecuteCommand(JSON.parse(jsonMatch[0])); } catch {}
    }
    return explanation || "Done.";
  } catch(e) { return "Error: "+e.message; }
}

            style="background:var(--amber);color:#1a1200;border:none;padding:7px 12px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer">GO</button>
        </div>
        <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">
          ${["Show Baltimore","Show DC","At risk?","Show all"].map(c=>`<button onclick="document.getElementById('ops-kera-input').value='${c}';opsMapSendKera()" style="background:var(--glass);border:1px solid var(--stroke);color:var(--ink3);font-family:var(--mono);font-size:9px;padding:3px 7px;cursor:pointer">${c}</button>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
};

async function opsMapSendKera() {
  const input = document.getElementById("ops-kera-input");
  const btn = document.getElementById("ops-kera-btn");
  const log = document.getElementById("ops-kera-log");
  if (!input || !input.value.trim()) return;
  const cmd = input.value.trim();
  if (log) { log.innerHTML += `<div style="color:var(--ink2)">> ${cmd}</div>`; log.scrollTop = log.scrollHeight; }
  if (btn) { btn.disabled=true; btn.textContent="..."; }
  const apiKey = ((SETTINGS&&SETTINGS.apiKey)||localStorage.getItem("api_key")||"").trim();
  const model = (SETTINGS&&SETTINGS.model)||localStorage.getItem("model")||"claude-sonnet-4-6";
  const reply = await opsMapKeraCommand(cmd, apiKey, model);
  if (log) { log.innerHTML += `<div style="color:var(--cyan2);padding-left:8px;border-left:2px solid var(--cyan)">${reply}</div>`; log.scrollTop = log.scrollHeight; }
  if (btn) { btn.disabled=false; btn.textContent="GO"; }
  input.value = "";
}

function procLog(line,cls=""){const el=$("#proclog");if(!el)return;el.insertAdjacentHTML("beforeend",`<div class="${cls}">${esc(line)}</div>`);el.scrollTop=el.scrollHeight}
function showProc(name){$("#procbox").innerHTML=`<div class="procwrap"><div class="scanline"></div><div class="proclog" id="proclog"></div></div>`;procLog("▶ INGEST PROTOCOL :: "+name,"am")}
function procDone(ok,msg){
  const box=$("#procbox");if(!box)return;
  const sl=box.querySelector(".scanline");if(sl)sl.remove();        // stop the scan line
  procLog((ok?"✓ COMPLETE — ":"✗ FAILED — ")+msg,ok?"ok":"dim");
}
async function runExtraction(blocks,raw,filename,sourceKind){
  if(aiUnavailableNote()){toast(aiUnavailableNote(),"am");return}
  if(!Store.hasClaude){const approx=blocks.reduce((s,b)=>s+((b.source&&b.source.data)?b.source.data.length:(b.text||"").length),0);
    if(approx>3600000){toast("File too large for the site gateway (~3 MB). Ingest this one inside Claude, or split it.","am");return}}
  showProc(filename||"pasted text");orbThinkSeq("ingest");
  const step=async(t,c)=>{procLog(t,c);if(!motionOff())await sleep(170)};
  try{
    await step("loading payload … "+(raw.text?Math.round((raw.text.length)/1024)+" KB text":raw.media||"binary"),"dim");
    await step("document type detection …","dim");
    await step("entity extraction pass — hospital · vendor · project · WO# · invoice · people · dates · risks · actions");
    const ex=await extractFromContent(blocks,filename);
    orbDone();
    await step("✓ extraction complete","ok");
    const conf=ex.confidence||{};
    await step("match confidence — hospital "+(conf.hospital??(ex.hospital?85:20))+"% · vendor "+(conf.vendor??((ex.vendors||[]).length?80:0))+"% · project "+(conf.project??((ex.projects||[]).length?70:0))+"%","am");
    await step("relationship mapping → review board","ok");
    PENDING={ex,raw,filename,sourceKind};
    renderReview();
    procDone(true,"extraction done — review & commit below");
  }catch(e){orbDone();procDone(false,e.message);toast(e.message,"err")}
}
function xplodeSVG(ex){
  const groups=[["Hospital",ex.hospital?1:0,"var(--amber)"],["Vendors",(ex.vendors||[]).length,"#9d8cff"],["Projects",(ex.projects||[]).length,"var(--cyan)"],["Work Orders",(ex.workOrders||[]).length,"#5fb6c9"],["Invoice",ex.invoice?1:0,"#d9b35f"],["People",(ex.people||[]).length,"#3fc492"],["Risks",(ex.risks||[]).length,"var(--crit)"],["Actions",(ex.actionItems||[]).length,"#f0c674"],["Assets",(ex.assets||[]).length,"#7d96ab"]].filter(g=>g[1]>0);
  const W=620,H=240,cx=140,cy=H/2;
  const ents=groups.map((g,i)=>{const a=((i+0.5)/groups.length)*Math.PI-Math.PI/2;const x=cx+250+([0,1].includes(i%3)?0:24),y=24+i*(H-40)/Math.max(1,groups.length-1||1);
    return {g,x:cx+230,y:groups.length===1?cy:24+i*((H-48)/(groups.length-1))}});
  return `<div class="xplode"><svg viewBox="0 0 ${W} ${H}">
    ${ents.map(e=>`<line class="xline" x1="${cx+52}" y1="${cy}" x2="${e.x}" y2="${e.y+11}"/>`).join("")}
    <g class="xnode"><rect x="${cx-58}" y="${cy-26}" width="116" height="52" rx="0"/><text x="${cx}" y="${cy-7}" text-anchor="middle" class="xt">SOURCE</text><text x="${cx}" y="${cy+10}" text-anchor="middle">${esc((PENDING.filename||"PASTED TEXT").slice(0,16).toUpperCase())}</text></g>
    ${ents.map(e=>`<g class="xnode"><rect x="${e.x}" y="${e.y}" width="150" height="24"/><circle cx="${e.x+11}" cy="${e.y+12}" r="3.5" fill="${e.g[2]}" style="filter:drop-shadow(0 0 5px ${e.g[2]})"/><text x="${e.x+22}" y="${e.y+16}">${esc(e.g[0]).toUpperCase()} · ${e.g[1]}</text></g>`).join("")}
  </svg></div>`}
function confBar(label,v){return `<div class="confbar"><span style="width:64px">${esc(label)}</span><div class="cb"><i style="width:${motionOff()?v:0}%" data-w="${v}"></i></div><span>${v}%</span></div>`}
function renderReview(){
  const ex=PENDING.ex,conf=ex.confidence||{};
  const cH=conf.hospital??(ex.hospital?85:20),cV=conf.vendor??((ex.vendors||[]).length?80:0),cP=conf.project??((ex.projects||[]).length?70:0);
  const sect=(label,items)=>items&&items.length?`<div style="margin-bottom:8px"><div class="eyebrow" style="margin-bottom:3px">${label}</div><div class="pillrow">${items.map(x=>`<span class="chip">${esc(typeof x==="string"?x:(x.title||x.description||x.number||JSON.stringify(x)).slice(0,60))}</span>`).join("")}</div></div>`:"";
  $("#reviewbox").innerHTML=`<div class="panel rail-a">
    <div class="panelhead"><span class="eyebrow am">Extraction Review Board</span><span class="pid">ING·02</span><span class="sm mut right mono">${esc(PENDING.filename||"pasted")}</span></div>
    ${xplodeSVG(ex)}
    <div class="sm" style="margin:6px 0 10px">${esc(ex.summary||"")}</div>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:14px">
      <div><div class="formrow"><label>Hospital</label><select id="rvHosp"><option value="">— not site-specific —</option>${DB.hospitals.map(h=>`<option value="${h.code}" ${ex.hospital===h.code?"selected":""}>${h.code} — ${esc(h.name)}</option>`).join("")}</select></div>
      ${!ex.hospital?'<div class="sm" style="color:var(--amber2);margin:-4px 0 10px">⚠ Hospital undetermined — set it above or leave portfolio-level.</div>':""}
      ${confBar("hospital",cH)}${confBar("vendor",cV)}${confBar("project",cP)}</div>
      <div>${sect("Vendors",ex.vendors)}${sect("People",ex.people)}${sect("Projects",ex.projects)}${sect("Assets",ex.assets)}
      ${sect("Work orders",ex.workOrders)}${ex.invoice?sect("Invoice",[(ex.invoice.vendorName||"")+" #"+(ex.invoice.number||"")+" "+fmt$(ex.invoice.amount)]):""}
      ${sect("Risks",ex.risks)}${sect("Action items",ex.actionItems)}${sect("Open questions",ex.openQuestions)}${sect("Compliance tags",ex.complianceTags)}</div></div>

async function fetchInboxEmails() {
  if (_inboxLoading) return;
  _inboxLoading = true;
  try {
    const r = await fetch(
      INBOX_CFG.url + "/rest/v1/ingested_emails?order=created_at.desc&limit=100",
      { headers: { apikey: INBOX_CFG.key, Authorization: "Bearer " + INBOX_CFG.key } }
    );
    if (!r.ok) { console.warn("[inbox] fetch failed:", r.status); toastOnce("inboxerr","Cloud inbox unreachable ("+r.status+"). Check Cloud Sync is connected and the server fix is deployed.","am"); return; }
    const rows = await r.json();
    if (!Array.isArray(rows)) return;

    // Map Supabase rows → DB.emails format
    const mapped = rows.map(row => ({
      id: "em-" + row.id,
      subject: row.subject || "(no subject)",
      from: row.from_address || row["from"] || "",
      to: row.to_address || row["to"] || "",
      body: row.body || row.text || row.html || "",
      summary: "",
      urgency: 1,
      createdAt: row.created_at || row.received_at || new Date().toISOString(),
      hospitalId: null,
      seeded: false,
      _fromSupabase: true,
    }));

    // Merge into DB.emails — avoid duplicates by id
    const existingIds = new Set((DB.emails || []).map(e => e.id));
    const newEmails = mapped.filter(e => !existingIds.has(e.id));
    if (newEmails.length > 0) {
      DB.emails = [...newEmails, ...(DB.emails || [])];
      toast(newEmails.length+" new email"+(newEmails.length>1?"s":"")+" from cloud inbox","ok");
    }

    _inboxLoaded = true;
    // Re-render if currently on email view
    if (ROUTE.name === "email") render();
  } catch(e) {
    console.warn("[inbox] error:", e.message);
  } finally {
    _inboxLoading = false;
  }
}

   Project Scope, Physical Environment, compliance binder */
function PROJECTScore(hid){const qs=byHosp(DB.requirements,hid);if(!qs.length)return 0;return Math.round(100*qs.filter(q=>["Ready","Complete"].includes(q.status)).length/qs.length)}
function reqEvidence(q){return linked(q.id).filter(x=>["document","workorder","invoice","email"].includes(typeOf(x.id)))}
function reqAutoStatus(q){
  if(["Deficiency Open","Corrective Action Pending","Complete"].includes(q.status))return q.status;
  if(q.nextDue&&isPast(q.nextDue))return"Overdue";
  if(q.lastDone&&q.freq==="annual"&&daysFrom(q.lastDone)>380)return"Expired";
  if(!reqEvidence(q).length)return"Missing Evidence";
  return q.status==="Ready"||q.verified?"Ready":"Needs Review";
}
function PROJECTHospBody(h){
  const qs=byHosp(DB.requirements,h.id);qs.forEach(q=>{const s=reqAutoStatus(q);if(s!==q.status){q.status=s}});saveDB();
  const cats=DB.meta.PROJECTCats||[];const dfs=byHosp(DB.deficiencies,h.id);
  if(typeof PROJECTOPEN==="undefined")window.PROJECTOPEN=null;
  const score=PROJECTScore(h.id);
  const tiles=cats.map(c=>{const list=qs.filter(q=>q.category===c);if(!list.length)return"";
    const ready=list.filter(q=>["Ready","Complete"].includes(q.status)).length,pct=Math.round(100*ready/list.length);
    const worst=list.some(q=>["Deficiency Open","Overdue","Expired"].includes(q.status))?"crit":ready<list.length?"warn":"ok";
    return `<div class="cattile ${PROJECTOPEN===c?"open":""}" onclick="PROJECTOPEN=PROJECTOPEN==='${esc(c)}'?null:'${esc(c)}';render()">
      <div class="flexr"><span class="led ${worst}"></span><b class="mono xs" style="letter-spacing:.06em">${esc(c).toUpperCase()}</b><span class="mono xs mut2 right">${ready}/${list.length}</span></div>
      <div class="catbar"><i style="width:${pct}%"></i></div></div>`}).join("");
  const open=PROJECTOPEN?qs.filter(q=>q.category===PROJECTOPEN):[];
  return `<div class="flexr" style="margin-bottom:13px">
    <div class="ringwrap panel tight heads-up" style="padding:10px 14px">${ringSVG(score,72,7)}<div class="ringlbl"><div class="rv" data-count="${score}">0</div><div class="rl">survey<br>readiness</div></div></div>
    <button class="btn primary" onclick="buildBinder('${h.id}')">⎙ Build Survey Binder</button>
    <button class="btn" onclick="quickAdd('requirement','${h.id}')">＋ Item</button>
    <button class="btn" onclick="quickAdd('deficiency','${h.id}')">＋ Deficiency</button>
    <span class="xs mut2">Readiness aid from your evidence — not an official standards interpretation.</span></div>
  ${compPipeline(qs,"PROJECT_"+h.id)}
  ${dfs.filter(d=>d.status!=="Closed").length?`<div class="panel tight rail-r" style="margin:13px 0"><div class="panelhead"><span class="eyebrow" style="color:#f4a9b3">Open Deficiencies → Corrective Action Flow</span><span class="pid">DEF·01</span></div>
    ${dfs.filter(d=>d.status!=="Closed").map(d=>`<div class="feeditem"><span class="led crit"></span><a href="#/e/deficiency/${d.id}" style="flex:1">${esc(d.title)}</a><span class="xs mut2">${esc(d.capOwner?("CAP: "+d.capOwner):"no CAP owner")} · due ${fmtD(d.capDue)}</span></div>`).join("")}</div>`:""}
  <div class="grid g3" style="margin:13px 0">${tiles}</div>
  ${PROJECTOPEN?`<div class="panel rail-a"><div class="panelhead"><span class="eyebrow am">${esc(PROJECTOPEN)}</span><span class="pid">CAT·${String(cats.indexOf(PROJECTOPEN)+1).padStart(2,"0")}</span><button class="btn sm right" onclick="PROJECTOPEN=null;render()">Collapse</button></div>
    ${open.map(q=>{const ev=reqEvidence(q);
      return `<div style="padding:7px 0;border-bottom:1px solid var(--hair)"><div class="flexr">
        <a href="#/e/requirement/${q.id}" style="flex:1;color:var(--ink)"><b>${esc(q.title)}</b> <span class="xs mut2">· ${esc(q.freq||"")}</span>${q.stdRef?` <span class="tag">${esc(q.stdRef)}</span>`:""}</a>
        ${statBadge(q.status)}
        <span class="mono xs" style="${q.nextDue&&isPast(q.nextDue)?'color:var(--crit)':'color:var(--ink3)'}">next ${fmtD(q.nextDue)}</span>
        <button class="btn sm" onclick="linkModal('${q.id}')">＋ Evidence</button></div>
        ${ev.length?`<div class="pillrow" style="margin-top:5px">${ev.map(x=>{const l=DB.links.find(L=>(L.a===q.id&&L.b===x.id)||(L.b===q.id&&L.a===x.id));return chip(x)+`<span class="tag">${l&&l.src==='ai'?'AI-linked':'user-linked'}</span>`}).join(" ")}</div>`:'<div class="xs" style="color:var(--amber2);margin-top:4px">Missing evidence — link a WO, vendor report, or document.</div>'}</div>`}).join("")||'<div class="empty">No items in this category.</div>'}</div>`:'<div class="empty">Select a category tile to open its evidence board.</div>'}`;
}
