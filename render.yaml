services:
  - type: web
    name: work-universe
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: INBOUND_SECRET
        value: medstar-inbox-2026
      - key: SUPABASE_URL
        scope: all
      - key: SUPABASE_ANON_KEY
        scope: all
