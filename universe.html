    <div><div class="eyebrow" style="margin-bottom:4px">Last Completed</div><input type="date" value="${esc(q.lastDone||"")}" onchange="updRec('${q.id}',{lastDone:this.value})"></div>
    <div><div class="eyebrow" style="margin-bottom:4px">Next Due</div><input type="date" value="${esc(q.nextDue||"")}" onchange="updRec('${q.id}',{nextDue:this.value})"></div>
    <div><div class="eyebrow" style="margin-bottom:4px">Owner</div><input value="${esc(q.owner||"")}" onchange="updRec('${q.id}',{owner:this.value})"></div>
    <div><div class="eyebrow" style="margin-bottom:4px">Standard Ref (optional)</div><input value="${esc(q.stdRef||"")}" placeholder="from licensed manual" onchange="updRec('${q.id}',{stdRef:this.value})"></div>
    <div><div class="eyebrow" style="margin-bottom:4px">Verification</div><button class="btn sm ${q.verified?'':'primary'}" onclick="updRec('${q.id}',{verified:${q.verified?'false':'true'},verifiedAt:'${nowISO()}',status:'${q.verified?'Needs Review':'Ready'}'});render()">${q.verified?"✓ User-verified — revoke":"Mark user-verified"}</button></div>

}

Views.calendar=()=>{
  const items=[...DB.requirements.filter(q=>q.nextDue).map(q=>({d:q.nextDue,r:q,k:"compliance"})),
    ...DB.actions.filter(a=>a.status==="Open"&&a.due).map(a=>({d:a.due,r:a,k:"action"})),
    ...DB.workOrders.filter(w=>!["Completed","Verified","Closed"].includes(w.status)&&w.due).map(w=>({d:w.due,r:w,k:"WO"})),
    ...DB.invoices.filter(i=>!["Paid","Archived"].includes(i.status)&&i.dueDate).map(i=>({d:i.dueDate,r:i,k:"invoice"}))].sort((a,b)=>a.d.localeCompare(b.d));
  const bucket=x=>{const d=daysUntil(x.d);return d<0?"Overdue":d<=7?"This Week":d<=30?"Next 30 Days":"Later"};
  const groups={};items.forEach(x=>{(groups[bucket(x)]=groups[bucket(x)]||[]).push(x)});
  return `<div class="view"><div class="pghead"><div class="grow"><div class="eyebrow am">Compliance & Deadline Calendar</div><h1 class="pg">Everything Due</h1></div></div>
  ${["Overdue","This Week","Next 30 Days","Later"].map(g=>groups[g]?`<div class="panel tight" style="margin-bottom:12px;${g==="Overdue"?"border-color:rgba(228,89,107,.4)":""}"><div class="panelhead"><span class="eyebrow ${g==='Overdue'?'':''}" style="${g==='Overdue'?'color:#f0a2ad':''}">${g}</span><span class="xs mut2 right">${groups[g].length}</span></div>
    ${groups[g].slice(0,40).map(x=>{const h=hospOf(x.r.id);return `<div class="flexr sm" style="padding:4px 0;border-bottom:1px solid var(--stroke)"><span class="mono xs" style="width:78px">${fmtD(x.d)}</span><span class="tag">${x.k}</span><span class="mono xs" style="width:60px;color:var(--amber2)">${h?esc(h.code):""}</span><a href="#/e/${typeOf(x.r.id)}/${x.r.id}" style="flex:1">${esc(nameOf(x.r)).slice(0,70)}</a>${x.r.owner?`<span class="xs mut2">${esc(x.r.owner)}</span>`:""}</div>`}).join("")}</div>`:"").join("")}</div>`;
};

/* ============================ PRINT ENGINE & REPORTS ============================ */
const DISCLAIMER="This report was generated from uploaded documentation and internal records. Final verification should be performed by the responsible hospital compliance/facilities representative.";
function srcLine(r){
  const parts=[];linked(r.id).forEach(x=>{const t=typeOf(x.id);
    if(t==="workorder")parts.push("Work Order #"+(x.number||x.id));
    if(t==="document")parts.push("Document \""+nameOf(x)+"\" uploaded "+fmtD(x.createdAt));
    if(t==="invoice")parts.push("Invoice #"+(x.number||x.id));
    if(t==="email")parts.push("Email \""+(x.subject||"").slice(0,40)+"\" dated "+fmtD(x.createdAt));
    if(t==="vendor")parts.push("Vendor: "+x.name)});
  return parts.length?"Source: "+parts.join("; "):"Source: no linked evidence on file";
}
function printDoc(html,auditLabel){
  $("#printdock").innerHTML=html;
  addRec("report",{title:auditLabel,generatedAt:nowISO(),preparedBy:SETTINGS.preparedBy},"ai");
  audit("report",null,null,auditLabel,"ai");
  setTimeout(()=>window.print(),150);
}
function repHead(title,h){
  return `<div class="cover"><div style="font-size:10pt;letter-spacing:.3em">WORK UNIVERSE OS · MEDSTAR PORTFOLIO</div><h1>${esc(title)}</h1>
  <p>${h?esc(h.name)+" ("+esc(h.code)+")":"All Sites"}</p><p>Reporting period: through ${fmtD(todayISO())}</p>
  <p>Prepared by: ${esc(SETTINGS.preparedBy)}<br>Date generated: ${fmtD(todayISO())}</p></div>`;
}
function buildBinder(hid){
  const h=rec(hid);const qs=byHosp(DB.requirements,h.id);qs.forEach(q=>q.status=reqAutoStatus(q));
  const dfs=byHosp(DB.deficiencies,h.id),missing=qs.filter(q=>!["Ready","Complete"].includes(q.status));
  const docs=byHosp(DB.documents,h.id);
  let html=repHead("Project Delivery project readiness Binder",h);
  html+=`<h2>Hospital Summary</h2><p>${esc(h.name)} project readiness binder assembled from work orders, vendor reports, invoices, emails, and uploaded compliance documents in the Work Universe memory. ${qs.length} tracked Delivery Items, ${dfs.filter(d=>d.status!=="Closed").length} open deficiencies.</p>
  <h2>project readiness Score</h2><p style="font-size:24pt;margin:6pt 0"><b>${PROJECTScore(h.id)}%</b> &nbsp; (${qs.filter(q=>["Ready","Complete"].includes(q.status)).length} of ${qs.length} items evidence-ready)</p>
  <h2>Open Risk Summary</h2>${byHosp(DB.risks,h.id).filter(r=>r.status==="Open").map(r=>`<p><b>${esc(r.severity.toUpperCase())}</b> — ${esc(r.title)}. ${esc(r.summary||"")}</p>`).join("")||"<p>No open risks recorded.</p>"}`;
  (DB.meta.PROJECTCats||[]).forEach(c=>{const list=qs.filter(q=>q.category===c);if(!list.length)return;
    html+=`<h2 class="pb">${esc(c)}</h2><table><tr><th style="width:34%">Requirement</th><th>Status</th><th>Last / Next</th><th>Owner</th><th style="width:34%">Evidence & Source</th></tr>`;
    list.forEach(q=>{const ev=reqEvidence(q);
      html+=`<tr><td>${esc(q.title)}${q.stdRef?"<br><i>Ref: "+esc(q.stdRef)+"</i>":""}</td><td>${esc(q.status)}${q.verified?" (user-verified)":""}</td><td>${fmtD(q.lastDone)} / ${fmtD(q.nextDue)}</td><td>${esc(q.owner||"—")}</td><td>${ev.length?ev.map(x=>esc(nameOf(x))).join("; ")+"<br><span class='src'>"+esc(srcLine(q))+"</span>":"<b>MISSING EVIDENCE</b>"}</td></tr>`});
    html+="</table>"});
  html+=`<h2 class="pb">Deficiency Log</h2>${dfs.length?`<table><tr><th>Deficiency</th><th>Category</th><th>Found</th><th>Status</th><th>Owner</th></tr>${dfs.map(d=>`<tr><td>${esc(d.title)}</td><td>${esc(d.category||"")}</td><td>${fmtD(d.createdAt)}</td><td>${esc(d.status)}</td><td>${esc(d.owner||"—")}</td></tr>`).join("")}</table>`:"<p>No deficiencies recorded.</p>"}
  <h2>Corrective Action Plans</h2>${dfs.filter(d=>d.capAction).map(d=>`<p><b>${esc(d.title)}</b> — CAP: ${esc(d.capAction)}. Owner: ${esc(d.capOwner||"unassigned")}. Due: ${fmtD(d.capDue)}. Status: ${esc(d.status)}.</p>`).join("")||"<p>No corrective action plans on file.</p>"}
  <h2>Missing Evidence List</h2>${missing.length?missing.map(q=>`<p>• ${esc(q.title)} — ${esc(q.status)}</p>`).join(""):"<p>None — all items carry evidence.</p>"}
  <h2 class="pb">Source Index</h2><table><tr><th>Document</th><th>Type</th><th>Ingested</th><th>Summary</th></tr>${docs.map(d=>`<tr><td>${esc(nameOf(d))}</td><td>${esc(d.docType||"")}</td><td>${fmtD(d.createdAt)}</td><td>${esc((d.summary||"").slice(0,120))}</td></tr>`).join("")||"<tr><td colspan='4'>No documents ingested yet.</td></tr>"}</table>
  <div class="sigline">Prepared by: ${esc(SETTINGS.preparedBy)}</div><div class="sigline">Reviewed / approved by (hospital compliance representative):</div>
  <div class="disc">${esc(DISCLAIMER)} Items marked AI-linked were connected automatically and should be confirmed during review.</div>`;
  printDoc(html,"PROJECT Survey Binder — "+h.code);
  audit("binder","hospital",h.id,"Survey binder generated","ai");toast("Binder built — print dialog opening. Saved to "+h.code+" timeline.","ok");
}
function printInvReport(hid,mode){

  if(mode==="missingpo")list=list.filter(i=>(i.flags||[]).includes("Missing PO"));
  let html=repHead(mode==="missingpo"?"Invoices Missing Purchase Orders":"Invoice Summary",h);
  html+=`<h2>${mode==="missingpo"?"Missing-PO":"Open & Recent"} Invoices</h2><table><tr><th>Invoice #</th><th>Vendor</th><th>Date</th><th>Due</th><th>Amount</th><th>Status</th><th>Flags</th></tr>
  ${list.map(i=>`<tr><td>${esc(i.number||"—")}</td><td>${esc(i.vendorName||"")}</td><td>${fmtD(i.date)}</td><td>${fmtD(i.dueDate)}</td><td>${fmt$(i.amount)}</td><td>${esc(i.status)}</td><td>${esc((i.flags||[]).join(", "))}</td></tr>`).join("")}</table>

  printDoc(html,(h?h.code+" ":"")+"Invoice report");
}
function printVendorAging(hid){
  const h=hid?rec(hid):null;const list=(h?byHosp(DB.invoices,h.id):DB.invoices).filter(i=>!["Paid","Archived"].includes(i.status));
  const byV={};list.forEach(i=>{const k=i.vendorName||"Unknown";byV[k]=byV[k]||{c:"current","0–30":0,"31–60":0,"61–90":0,"90+":0,current:0,total:0};const a=aging(i);byV[k][a==="—"?"current":a]+=i.amount||0;byV[k].total+=i.amount||0});
  let html=repHead("Vendor Aging Report",h);
  html+=`<h2>Open Invoice Aging by Vendor</h2><table><tr><th>Vendor</th><th>Current</th><th>0–30</th><th>31–60</th><th>61–90</th><th>90+</th><th>Total</th></tr>
  ${Object.entries(byV).sort((a,b)=>b[1].total-a[1].total).map(([v,x])=>`<tr><td>${esc(v)}</td><td>${fmt$(x.current)}</td><td>${fmt$(x["0–30"])}</td><td>${fmt$(x["31–60"])}</td><td>${fmt$(x["61–90"])}</td><td>${fmt$(x["90+"])}</td><td><b>${fmt$(x.total)}</b></td></tr>`).join("")}</table>
  <div class="sigline">Prepared by: ${esc(SETTINGS.preparedBy)}</div><div class="disc">${esc(DISCLAIMER)}</div>`;
  printDoc(html,(h?h.code+" ":"")+"Vendor aging");
}

async function aiReport(kind){
  const out=$("#repout");out.innerHTML='<div class="thinking"><i></i><i></i><i></i></div>';
  const digest=snapshotFor(kind==="weekly"?"week update project risk overdue vendor":"critical risk overdue project invoice compliance",36);
  const prompts={
    onepager:"Write a one-page leadership summary of the portfolio for senior leadership. Plain prose paragraphs, no bullets, no headers, direct, professional. Cover: overall state, the 3-4 items that matter most, money exposure if relevant, compliance posture, and what you (Antoine) are driving this week.",
    weekly:"Draft the weekly update email from Antoine to Nick Queensland and Tom Watson. Plain prose, no bullets, no hyphens as separators, direct and confident, 150-220 words, subject line first.",
    top5:"List the top 5 issues across all hospitals as five short plain-prose paragraphs, each starting with the hospital code and a colon, ranked by risk. End with one sentence on what to escalate."};
  try{const r=await AI.call([{role:"user",content:portfolioContext()+"\nLIVE MEMORY:\n"+digest+"\nToday is "+todayISO()+".\n\n"+prompts[kind]}],{maxTokens:1000});
    out.innerText=r.text;audit("report",null,null,"AI draft: "+kind,"ai");
  }catch(e){out.innerText=e.message}
}
function printStatusReport(){
  let html=repHead("Hospital-by-Hospital Status Report",null);
  DB.hospitals.forEach(h=>{const pr=byHosp(DB.projects,h.id).filter(p=>p.status==="Active"),rk=byHosp(DB.risks,h.id).filter(r=>r.status==="Open"),ac=byHosp(DB.actions,h.id).filter(a=>a.status==="Open");
    html+=`<h2>${esc(h.code)} — ${esc(h.name)}</h2><p>PROJECT readiness ${PROJECTScore(h.id)}%. ${pr.length} active projects, ${rk.length} open risks, ${ac.length} open actions.</p>
    ${pr.map(p=>`<p><b>${esc(p.title)}</b> (${esc(p.status)}). ${esc((p.summary||"").slice(0,220))} <span class="src">${esc(srcLine(p))}</span></p>`).join("")}
    ${rk.map(r=>`<p><i>Risk (${esc(r.severity)}):</i> ${esc(r.title)}.</p>`).join("")}`});
  html+=`<div class="sigline">Prepared by: ${esc(SETTINGS.preparedBy)}</div><div class="disc">${esc(DISCLAIMER)}</div>`;
  printDoc(html,"Portfolio status report");
}

function bfsPath(a,b){
  const adj={};DB.links.forEach(l=>{(adj[l.a]=adj[l.a]||[]).push(l.b);(adj[l.b]=adj[l.b]||[]).push(l.a)});
  const prev={[a]:null},q=[a];
  while(q.length){const n=q.shift();if(n===b)break;for(const m of(adj[n]||[]))if(!(m in prev)){prev[m]=n;q.push(m)}}
  if(!(b in prev))return null;const path=[];let n=b;while(n){path.unshift(n);n=prev[n]}return path;
}
function graphData(){
  const nodes=new Map(),links=[];
  const add=r=>{const t=typeOf(r.id);if(!nodes.has(r.id))nodes.set(r.id,{id:r.id,t,label:nameOf(r).slice(0,26),deg:0,recent:daysFrom(r.updatedAt)<=1&&!r.seeded});return true};
  if(GRAPH.isolate){const c=rec(GRAPH.isolate);if(c){add(c);linked(GRAPH.isolate).forEach(add);
    DB.links.forEach(l=>{if(nodes.has(l.a)&&nodes.has(l.b))links.push({source:l.a,target:l.b})})}}
  else{
    const ok=r=>GRAPH.filter.has(typeOf(r.id));
    DB.hospitals.forEach(h=>GRAPH.filter.has("hospital")&&add(h));
    for(const l of DB.links){const ra=rec(l.a),rb=rec(l.b);if(!ra||!rb)continue;
      const seedEdge=(typeOf(l.a)==="hospital"&&ok(rb))||(typeOf(l.b)==="hospital"&&ok(ra));
      const expEdge=GRAPH.expanded.has(l.a)||GRAPH.expanded.has(l.b);
      if(seedEdge||expEdge){add(ra);add(rb);links.push({source:l.a,target:l.b})}}
  }
  if(GRAPH.pathIds)GRAPH.pathIds.forEach(id=>{const r=rec(id);if(r&&!nodes.has(id))add(r)});
  links.forEach(l=>{const a=nodes.get(l.source),b=nodes.get(l.target);if(a)a.deg++;if(b)b.deg++});
  return{nodes:[...nodes.values()],links};
}
function drawGraph(){
  const svg=d3.select("#graphsvg");if(svg.empty())return;svg.selectAll("*").remove();
  const wrap=$("#graphwrap"),W=wrap.clientWidth,H=wrap.clientHeight;
  const {nodes,links}=graphData(),q=($("#gsearch2")?.value||"").toLowerCase();
  const inPath=id=>GRAPH.pathIds&&GRAPH.pathIds.includes(id);
  const mode=$("#gmode");if(mode)mode.textContent=GRAPH.isolate?("ISOLATED: "+nameOf(rec(GRAPH.isolate)).slice(0,24)):GRAPH.pathA&&!GRAPH.pathIds?"PATH: pick second node (shift-click)":GRAPH.pathIds?"PATH TRACED · "+GRAPH.pathIds.length+" hops":"";
  const g=svg.append("g");
  svg.call(d3.zoom().scaleExtent([.25,3]).on("zoom",e=>g.attr("transform",e.transform)));
  const sim=d3.forceSimulation(nodes).force("link",d3.forceLink(links).id(d=>d.id).distance(80).strength(.5))
    .force("charge",d3.forceManyBody().strength(-230)).force("center",d3.forceCenter(W/2,H/2)).force("collide",d3.forceCollide(27));
  const link=g.append("g").selectAll("line").data(links).join("line")
    .attr("class",d=>"glink"+((GRAPH.pathIds&&inPath(d.source.id||d.source)&&inPath(d.target.id||d.target))?" path":(GRAPH.expanded.has(d.source.id||d.source)||GRAPH.expanded.has(d.target.id||d.target))&&!motionOff()?" flow":""));
  const node=g.append("g").selectAll("g").data(nodes).join("g")
    .attr("class",d=>"gnode"+(d.recent&&!motionOff()?" pulse":""))
    .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.25).restart();d.fx=d.x;d.fy=d.y})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
    .on("click",(e,d)=>{
      if(e.shiftKey){if(!GRAPH.pathA){GRAPH.pathA=d.id;GRAPH.pathIds=null}else{GRAPH.pathIds=bfsPath(GRAPH.pathA,d.id);if(!GRAPH.pathIds)toast("No path found between those nodes","am");GRAPH.pathA=GRAPH.pathIds?null:d.id}drawGraph();return}
      GRAPH.expanded.has(d.id)?GRAPH.expanded.delete(d.id):GRAPH.expanded.add(d.id);showGInfo(d.id);drawGraph()})
    .on("dblclick",(e,d)=>{e.preventDefault();GRAPH.isolate=GRAPH.isolate===d.id?null:d.id;GRAPH.expanded.clear();showGInfo(d.id);drawGraph()});
  node.append("circle").attr("r",d=>d.t==="hospital"?15:7+Math.min(6,d.deg*0.8))
    .attr("fill",d=>ENT[d.t].color).attr("fill-opacity",d=>q&&!d.label.toLowerCase().includes(q)?.15:.85)
    .attr("stroke",d=>inPath(d.id)?"var(--amber)":GRAPH.expanded.has(d.id)||GRAPH.isolate===d.id?"#fff":"rgba(255,255,255,.25)")
    .attr("stroke-width",d=>inPath(d.id)||GRAPH.expanded.has(d.id)||GRAPH.isolate===d.id?2:1)
    .style("filter",d=>"drop-shadow(0 0 6px "+ENT[d.t].color+"66)");
  node.append("text").attr("dy",d=>d.t==="hospital"?28:20).attr("text-anchor","middle").text(d=>d.label)
    .attr("opacity",d=>q&&!d.label.toLowerCase().includes(q)?.22:1);
  sim.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);node.attr("transform",d=>`translate(${d.x},${d.y})`)});
}

let CONVO=false;
function speak(text){ Speech.say(text); }
const Speech = {
  audio:null, chunks:[], idx:0, on:false,
  playing(){ return this.on; },
  stop(){
    this.on=false; this.chunks=[]; this.idx=0;
    try{ if(this.audio){ this.audio.onended=null; this.audio.onerror=null; this.audio.pause(); this.audio.src=""; } }catch(e){}
    this.audio=null;
    try{ speechSynthesis.cancel(); }catch(e){}
    orbOff();
  },
  _afterEnd(){
    this.on=false; orbOff();
    if((CONVO && SETTINGS && SETTINGS.convoMode) || VOICEMODE){ setTimeout(()=>{ if(!REC && !Speech.on) toggleMic(); }, 350); }
  },
  splitSentences(t){
    const parts=(t||"").replace(/\s+/g," ").trim().match(/[^.!?]+[.!?]*/g)||[t];
    const out=[]; let cur="";
    for(const p of parts){ if((cur+" "+p).length>460){ if(cur)out.push(cur.trim()); cur=p; } else cur=cur?cur+" "+p:p; }
    if(cur.trim())out.push(cur.trim());
    return out.filter(Boolean);
  },
  async say(text){
    if(!text)return; this.stop();
    const t=String(text).replace(/\[[a-z]+-[a-z0-9]+\]/gi,"").replace(/[*_#`>]/g,"").slice(0,2400);
    const key=((SETTINGS&&SETTINGS.googleTTSKey)||"").trim();
    if(key && (SETTINGS.voiceProvider||"auto")!=="device"){
      try{ this.chunks=this.splitSentences(t); this.idx=0; this.on=true; orb("speaking"); await this._play(key); return; }
      catch(e){ this.on=false; toastOnce("ttsfb","Human voice unavailable — using this device's voice ("+(e.message||"error").slice(0,60)+")","am"); }
    }
    this._device(t);
  },
  async _play(key){
    if(!this.on) return;
    if(this.idx>=this.chunks.length){ this._afterEnd(); return; }
    const voice=(SETTINGS&&SETTINGS.googleVoice)||"en-US-Neural2-F";
    const body={input:{text:this.chunks[this.idx]},voice:{languageCode:voice.slice(0,5),name:voice},audioConfig:{audioEncoding:"MP3",speakingRate:Math.max(0.5,Math.min(2,SETTINGS.voiceRate||1))}};
    const r=await fetch("https://texttospeech.googleapis.com/v1/text:synthesize?key="+encodeURIComponent(key),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok){ const tx=await r.text().catch(()=>""); throw new Error("Google TTS "+r.status+" "+tx.slice(0,100)); }
    const j=await r.json(); if(!j.audioContent) throw new Error("empty audio");
    const a=new Audio("data:audio/mp3;base64,"+j.audioContent); this.audio=a;
    a.onended=()=>{ this.idx++; this._play(key).catch(()=>{ this._afterEnd(); }); };
    a.onerror=()=>{ this.idx++; this._play(key).catch(()=>{ this._afterEnd(); }); };
    await a.play();
  },
  _device(text){
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text.slice(0,1600));
      u.rate=SETTINGS.voiceRate||1;
      const v=this._bestVoice(); if(v)u.voice=v;
      this.on=true; orb("speaking");
      u.onend=u.onerror=()=>{ this._afterEnd(); };
      speechSynthesis.speak(u);
    }catch(e){ this.on=false; orbOff(); toast("Voice unavailable in this browser","am"); }
  },
  _bestVoice(){
    const vs=speechSynthesis.getVoices()||[];
    const pref=[/Google US English/i,/Samantha/i,/Aria/i,/Jenny/i,/Ava/i,/Natural/i,/Siri/i,/Neural/i];
    for(const re of pref){ const v=vs.find(v=>re.test(v.name)); if(v)return v; }
    return vs.find(v=>/en[-_]US/i.test(v.lang))||vs[0]||null;
  }
};
let REC=null;
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(REC){ REC.stop(); CONVO=false; return; }
  if(Speech.playing()){ Speech.stop(); CONVO=false; return; }
  if(!SR){toast("Speech recognition not supported here — type into the Brain instead.","am");return}
  CONVO=!!(SETTINGS&&SETTINGS.convoMode);
  REC=new SR();REC.lang="en-US";REC.interimResults=false;const _mb=$("#micbtn");if(_mb)_mb.classList.add("on");orb("listening","Listening…");
  REC.onresult=e=>{const t=e.results[0][0].transcript;toast("🎙 "+t);
    if(/^\s*(stop|cancel|never ?mind|that's all|thank you)\s*$/i.test(t)){CONVO=false;return}
    if(/briefing/i.test(t))runBriefing();
    else if(/^(add|new) note /i.test(t)){const txt=t.replace(/^(add|new) note /i,"");addRec("note",{title:"Voice note",text:txt});toast("Note saved","ok")}
    else{go("#/brain");setTimeout(()=>askBrain(t),250)}};
  REC.onend=()=>{REC=null;const b=$("#micbtn");if(b)b.classList.remove("on");if(!Speech.playing())orbOff()};REC.onerror=REC.onend;
  REC.start();
}

async function purgeSeededReqs(){
  let changed=false;
  if(Array.isArray(DB.requirements)&&DB.requirements.some(q=>q&&q.seeded)){
    const rm=new Set(DB.requirements.filter(q=>q&&q.seeded).map(q=>q.id));
    DB.requirements=DB.requirements.filter(q=>!(q&&q.seeded));
    if(Array.isArray(DB.links))DB.links=DB.links.filter(L=>!rm.has(L.a)&&!rm.has(L.b));
    changed=true;
  }
  if(Array.isArray(DB.workOrders)&&DB.workOrders.length){
    const wo=new Set(DB.workOrders.map(w=>w.id));
    DB.workOrders=[];
    if(Array.isArray(DB.links))DB.links=DB.links.filter(L=>!wo.has(L.a)&&!wo.has(L.b));
    changed=true;
  }
  if(changed){try{await Store.set(DB_KEY,DB)}catch(e){}}
}

  await purgeSeededReqs();
  let mig=false;
  for(const d of DB.documents){if(d.fileB64){await Store.set("wuos:file:"+d.id,{media:d.fileMedia||"application/pdf",b64:d.fileB64});delete d.fileB64;delete d.fileMedia;d.hasFile=true;mig=true}}
  if(mig)await Store.set(DB_KEY,DB);
  parseRoute();render();
  window.addEventListener("hashchange",()=>{parseRoute();render()});
  $("#gsearchinput").addEventListener("click",openSearch);
  $("#sinput").addEventListener("input",debounce(renderSearch,120));
  $("#sinput").addEventListener("keydown",e=>{if(e.key==="Enter"){const f=$("#sres .srow");if(f)f.click()}if(e.key==="Escape")closeSearch()});
  document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openSearch()}if(e.key==="Escape"){closeSearch();closeModal();closeNav()}});
  $("#sov").addEventListener("click",e=>{if(e.target.id==="sov")closeSearch()});
  $("#modalveil").addEventListener("click",e=>{if(e.target.id==="modalveil")closeModal()});
  $("#micbtn").onclick=openVoiceMode;$("#briefbtn").onclick=runBriefing;$("#orb").onclick=openVoiceMode;
  startClock();if(SETTINGS.motion==="off")document.body.classList.add("no-motion");
  window.addEventListener("resize",debounce(()=>{if(ROUTE.name==="dashboard")drawUMap();if(ROUTE.name==="graph")drawGraph()},220));
  toast("Universe online · "+(Store.env==="claude"?"persistent memory active":"local mode")+" · "+DB.links.length+" connections","ok");
}
boot();
</script>
</body>
</html>
