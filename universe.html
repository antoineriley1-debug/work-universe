<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Work Universe OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root{--bg:#070b14;--bg2:#0a1020;--panel:#0d1426;--panel2:#101a30;--stroke:#1c2842;--stroke2:#27365a;
--txt:#dfe7f2;--mut:#8fa0b3;--mut2:#64748b;--amber:#e8a33d;--amber2:#f0c674;--crit:#e4596b;--warn:#e8a33d;
--ok:#3fb68b;--info:#6ea3cf;--violet:#9d8cff;--mono:'SF Mono','Cascadia Code',Menlo,Consolas,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:radial-gradient(1200px 700px at 75% -10%,#101a35 0%,var(--bg) 55%);color:var(--txt);
font:14px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh}
a{color:var(--info);text-decoration:none}a:hover{text-decoration:underline}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#22304f;border-radius:6px}
button{font:inherit;color:inherit}
/* ---------- layout ---------- */
#app{display:flex;min-height:100vh}
#side{width:228px;flex:0 0 228px;background:linear-gradient(180deg,#0a1124,#080d1b);border-right:1px solid var(--stroke);
display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:60}
#brand{padding:18px 18px 14px;border-bottom:1px solid var(--stroke)}
#brand .b1{font-weight:800;letter-spacing:2.5px;color:var(--amber);font-size:15px}
#brand .b2{font-size:10px;letter-spacing:2px;color:var(--mut2);text-transform:uppercase;margin-top:2px}
#nav{padding:10px 10px 24px;flex:1}
.navsec{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut2);padding:14px 10px 5px}
.navitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--mut);
font-size:13px;user-select:none;border:1px solid transparent}
.navitem:hover{background:#111b33;color:var(--txt)}
.navitem.active{background:linear-gradient(90deg,rgba(232,163,61,.14),rgba(232,163,61,.03));color:var(--amber2);border-color:rgba(232,163,61,.25)}
.ni{width:18px;text-align:center;opacity:.9}
.badge{margin-left:auto;background:var(--crit);color:#fff;font-size:10px;font-weight:700;min-width:18px;text-align:center;
padding:1px 5px;border-radius:9px}
.badge.zero{display:none}
#mainwrap{flex:1;min-width:0;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--stroke);
background:rgba(10,16,32,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
#menubtn{display:none;background:var(--panel);border:1px solid var(--stroke2);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:16px}
#gsearchinput{flex:1;max-width:520px;background:var(--panel);border:1px solid var(--stroke2);border-radius:9px;
padding:7px 12px;color:var(--mut);cursor:pointer;font-size:13px;display:flex;gap:8px;align-items:center}
#gsearchinput:hover{border-color:var(--amber)}
.tbtn{background:var(--panel);border:1px solid var(--stroke2);border-radius:9px;padding:7px 11px;cursor:pointer;font-size:14px}
.tbtn.on{border-color:var(--crit);color:var(--crit);box-shadow:0 0 10px rgba(228,89,107,.4)}
#cloudchip{font-size:10px;letter-spacing:1.4px;font-weight:700;padding:5px 10px;border-radius:14px;border:1px solid var(--stroke2);color:var(--mut2);white-space:nowrap}
#cloudchip.on{color:#0c1322;background:var(--ok);border-color:var(--ok)}
#cloudchip.warn{color:#0c1322;background:var(--amber);border-color:var(--amber)}
#main{flex:1;padding:18px 22px 60px;min-width:0}
.view{max-width:1180px;margin:0 auto;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* ---------- page chrome ---------- */
.pghead{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.grow{flex:1;min-width:0}
.eyebrow{font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--mut2);font-weight:700}
.eyebrow.am{color:var(--amber)}
h1.pg{font-size:24px;font-weight:800;letter-spacing:.3px;margin-top:2px}
.pgsub{color:var(--mut);font-size:12.5px;margin-top:3px}
.panel{background:linear-gradient(180deg,var(--panel),#0b1222);border:1px solid var(--stroke);border-radius:13px;
padding:14px 16px;margin-bottom:14px;box-shadow:0 8px 28px rgba(0,0,0,.28)}
.panel.tight{padding:10px 13px}
.panelhead{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.right{margin-left:auto}
.rail-c{border-left:3px solid var(--crit)}
.rail-a{border-left:3px solid var(--amber)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.metric{background:linear-gradient(180deg,var(--panel),#0b1222);border:1px solid var(--stroke);border-radius:13px;
padding:13px 15px;cursor:pointer;transition:border-color .15s}
.metric:hover{border-color:var(--stroke2)}
.metric .mv{font-size:26px;font-weight:800;font-family:var(--mono);margin:4px 0 2px}
.metric .ml{font-size:11px;color:var(--mut2)}
.metric.crit{border-color:rgba(228,89,107,.45)}.metric.crit .mv{color:var(--crit)}
.metric.warn{border-color:rgba(232,163,61,.4)}.metric.warn .mv{color:var(--amber2)}
.metric.ok .mv{color:var(--ok)}.metric.info .mv{color:var(--info)}
/* ---------- tables ---------- */
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;min-width:560px}
.tbl th{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mut2);text-align:left;
padding:7px 9px;border-bottom:1px solid var(--stroke2);white-space:nowrap}
.tbl td{padding:8px 9px;border-bottom:1px solid var(--stroke);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.rowlink{cursor:pointer}.rowlink:hover td{background:rgba(110,163,207,.06)}
.mono{font-family:var(--mono)}.xs{font-size:11.5px}.sm{font-size:12.5px}.sm2{font-size:11px;color:var(--mut2);margin-left:auto}
.mut{color:var(--mut)}.mut2{color:var(--mut2)}.num{font-family:var(--mono)}
.empty{color:var(--mut2);font-size:12.5px;padding:14px;text-align:center}
/* ---------- chips & badges ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;background:#121d36;border:1px solid var(--stroke2);
border-radius:13px;padding:2px 9px;font-size:11px;color:var(--mut);margin:2px 3px 2px 0;cursor:pointer;white-space:nowrap}
.chip:hover{border-color:var(--amber);color:var(--txt)}
.pillrow{display:flex;flex-wrap:wrap}
.stat{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
padding:2px 8px;border-radius:10px;border:1px solid;white-space:nowrap}
.s-ok{color:var(--ok);border-color:rgba(63,182,139,.5);background:rgba(63,182,139,.1)}
.s-warn{color:var(--amber2);border-color:rgba(232,163,61,.5);background:rgba(232,163,61,.1)}
.s-crit{color:var(--crit);border-color:rgba(228,89,107,.55);background:rgba(228,89,107,.12)}
.s-info{color:var(--info);border-color:rgba(110,163,207,.5);background:rgba(110,163,207,.1)}
.s-dim{color:var(--mut2);border-color:var(--stroke2);background:#0e1729}
.led{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:var(--mut2)}
.led.ok{background:var(--ok);box-shadow:0 0 8px rgba(63,182,139,.7)}
.led.warn{background:var(--amber);box-shadow:0 0 8px rgba(232,163,61,.7)}
.led.crit{background:var(--crit);box-shadow:0 0 8px rgba(228,89,107,.8)}
/* ---------- dashboard pulse ---------- */
#pulse{display:grid;grid-template-columns:repeat(10,1fr);gap:7px;margin-bottom:16px}
.pseg{background:var(--panel);border:1px solid var(--stroke);border-radius:10px;padding:8px 9px;cursor:pointer;min-width:0}
.pseg:hover{border-color:var(--stroke2)}
.pseg.s-crit{border-color:rgba(228,89,107,.5)}.pseg.s-warn{border-color:rgba(232,163,61,.45)}
.pc{font-family:var(--mono);font-size:11px;font-weight:700;display:flex;align-items:center}
.pn{font-size:9.5px;color:var(--mut2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ---------- hospital tiles ---------- */
.htile{background:linear-gradient(180deg,var(--panel),#0b1222);border:1px solid var(--stroke);border-radius:13px;
padding:14px;cursor:pointer}
.htile:hover{border-color:var(--amber)}
.hc{font-family:var(--mono);font-weight:800;font-size:15px;display:flex;align-items:center}
.hn{font-size:11.5px;color:var(--mut);margin:4px 0 10px}
.hstats{display:flex;gap:12px;flex-wrap:wrap}
.hstat{font-size:10px;color:var(--mut2);text-transform:uppercase;letter-spacing:1px}
.hstat b{display:block;font-size:16px;color:var(--txt);font-family:var(--mono)}
/* ---------- tabs / timeline ---------- */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:6px 12px;border:1px solid var(--stroke2);border-radius:9px;font-size:11.5px;cursor:pointer;color:var(--mut);background:var(--panel)}
.tab.on{border-color:var(--amber);color:var(--amber2);background:rgba(232,163,61,.08)}
.tline{border-left:2px solid var(--stroke2);padding-left:14px;margin-left:5px}
.tev{position:relative;padding:5px 0}
.tev:before{content:"";position:absolute;left:-19px;top:11px;width:8px;height:8px;border-radius:50%;background:var(--info)}
.tev.am:before{background:var(--amber)}
.tev .td{font-size:10px;color:var(--mut2);font-family:var(--mono)}
/* ---------- project matrix ---------- */
.mxwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
table.mx{border-collapse:separate;border-spacing:4px;min-width:640px}
.mx th{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--mut2);padding:4px 6px;text-align:center;font-weight:700}
.mx th.rowh{text-align:right;font-family:var(--mono);font-size:11px;color:var(--mut);padding-right:9px;cursor:pointer}
.mx th.rowh:hover{color:var(--amber2)}
.mxc{width:54px;height:38px;border-radius:8px;border:1px solid var(--stroke);background:#0c1426;text-align:center;
font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;color:var(--mut2)}
.mxc:hover{border-color:var(--amber)}
.mxc.ok{background:rgba(63,182,139,.16);border-color:rgba(63,182,139,.45);color:var(--ok)}
.mxc.warn{background:rgba(232,163,61,.16);border-color:rgba(232,163,61,.5);color:var(--amber2)}
.mxc.crit{background:rgba(228,89,107,.18);border-color:rgba(228,89,107,.55);color:var(--crit)}
.mxc.dim{opacity:.45;cursor:default}
/* ---------- war room ring & pipeline ---------- */
.ringwrap{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.ring{position:relative;width:128px;height:128px;flex:0 0 128px}
.ring svg{transform:rotate(-90deg)}
.ringv{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringv b{font-size:26px;font-family:var(--mono)}
.ringv span{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mut2)}
.pipe{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
.pstage{background:#0d1730;border:1px solid var(--stroke2);border-radius:10px;padding:7px 11px;cursor:pointer;min-width:84px}
.pstage:hover{border-color:var(--amber)}
.pstage b{display:block;font-size:18px;font-family:var(--mono)}
.pstage span{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--mut2)}
.fillbar{height:6px;border-radius:4px;background:#16213c;overflow:hidden;margin-top:7px}
.fillbar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),var(--info))}
/* ---------- ingest ---------- */
#dropzone{border:2px dashed var(--stroke2);border-radius:14px;padding:34px 16px;text-align:center;color:var(--mut);
cursor:pointer;transition:border-color .15s,background .15s}
#dropzone.over{border-color:var(--amber);background:rgba(232,163,61,.06)}
.procwrap{position:relative;background:#070d1c;border:1px solid var(--stroke2);border-radius:12px;overflow:hidden;margin-top:12px}
.scanline{position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent,var(--amber),transparent);
animation:scan 1.6s linear infinite}
@keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(140px)}}
.proclog{font-family:var(--mono);font-size:11.5px;padding:12px 14px;max-height:240px;overflow-y:auto;color:var(--mut)}
.proclog .ok{color:var(--ok)}.proclog .am{color:var(--amber2)}.proclog .err{color:var(--crit)}.proclog .dim{color:var(--mut2)}
textarea,input,select{background:#0b1428;border:1px solid var(--stroke2);border-radius:9px;color:var(--txt);
padding:8px 11px;font:inherit;font-size:16px;width:100%}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--amber)}
label.f{display:block;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut2);margin:10px 0 4px}
/* ---------- buttons ---------- */
.btn{background:#13203c;border:1px solid var(--stroke2);border-radius:9px;padding:7px 13px;cursor:pointer;
font-size:12.5px;color:var(--txt);white-space:nowrap}
.btn:hover{border-color:var(--amber)}
.btn.primary{background:linear-gradient(180deg,#e8a33d,#cf8a26);border-color:#cf8a26;color:#171003;font-weight:700}
.btn.danger{border-color:rgba(228,89,107,.5);color:var(--crit)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn:disabled,.btn.disabled{opacity:.45;cursor:not-allowed}
.flexr{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* ---------- brain ---------- */
#brainlog{max-height:54vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px}
.bmsg{max-width:88%;padding:10px 13px;border-radius:13px;font-size:13px;white-space:pre-wrap}
.bmsg.u{align-self:flex-end;background:#1a2848;border:1px solid var(--stroke2)}
.bmsg.a{align-self:flex-start;background:#101a30;border:1px solid rgba(232,163,61,.3)}
.orb{width:11px;height:11px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px rgba(232,163,61,.8)}
.orb.think{animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
/* ---------- search overlay & modal ---------- */
#sov{position:fixed;inset:0;background:rgba(4,7,14,.78);backdrop-filter:blur(6px);display:none;z-index:200;padding:8vh 16px 0}
#sov.open{display:block}
#sbox{max-width:620px;margin:0 auto;background:var(--panel2);border:1px solid var(--stroke2);border-radius:15px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.6)}
#sinput{border:none;border-bottom:1px solid var(--stroke);border-radius:0;padding:14px 16px;font-size:16px;background:transparent}
#sres{max-height:52vh;overflow-y:auto;padding:6px}
.sgrp{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut2);padding:9px 10px 3px}
.srow{padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;display:flex;gap:8px;align-items:center}
.srow:hover,.srow.sel{background:#16223e}
#modalveil{position:fixed;inset:0;background:rgba(4,7,14,.78);backdrop-filter:blur(6px);display:none;z-index:220;padding:7vh 16px;overflow-y:auto}
#modalveil.open{display:block}
#modalbox{max-width:560px;margin:0 auto;background:var(--panel2);border:1px solid var(--stroke2);border-radius:15px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.6)}
/* ---------- toasts ---------- */
#toasts{position:fixed;bottom:18px;right:18px;z-index:400;display:flex;flex-direction:column;gap:8px}
.toast{background:#101a30;border:1px solid var(--stroke2);border-left:3px solid var(--info);border-radius:11px;
padding:10px 14px;font-size:12.5px;box-shadow:0 12px 34px rgba(0,0,0,.45);max-width:340px;animation:fadein .2s ease}
.toast.ok{border-left-color:var(--ok)}.toast.err{border-left-color:var(--crit)}.toast.am{border-left-color:var(--amber)}
/* ---------- graph ---------- */
#gwrap{position:relative;background:#070c19;border:1px solid var(--stroke);border-radius:13px;overflow:hidden}
#gsvg{width:100%;height:62vh;display:block}
#gsvg text{fill:var(--mut);font-size:9.5px;pointer-events:none}
#ginfo{position:absolute;right:10px;top:10px;width:250px;max-width:78%}
.sweepg{animation:sweepRot 6s linear infinite;transform-origin:300px 300px}
@keyframes sweepRot{to{transform:rotate(360deg)}}
.blip{cursor:pointer}
.blip.hot .vis{animation:blipPulse 1.3s ease-in-out infinite}
@keyframes blipPulse{0%,100%{opacity:1}50%{opacity:.4}}
.rlab{font-family:var(--mono);font-size:10.5px;fill:var(--mut);cursor:pointer}
.rlab:hover{fill:var(--amber2)}
.rlab.dim{fill:var(--mut2);opacity:.55}
/* ---------- drawers ---------- */
.drawer{border:1px solid rgba(232,163,61,.35);border-radius:13px;background:#0d1528;padding:13px 15px;margin-top:12px;animation:fadein .2s ease}
/* ---------- veil for mobile menu ---------- */
#sideveil{position:fixed;inset:0;background:rgba(4,7,14,.6);z-index:55;display:none}
/* ---------- mobile ---------- */
@media (max-width:880px){
  #side{position:fixed;left:0;top:0;bottom:0;transform:translateX(-105%);transition:transform .22s ease;width:248px;box-shadow:14px 0 40px rgba(0,0,0,.5)}
  #side.open{transform:none}
  #sideveil.open{display:block}
  #menubtn{display:block}
  #main{padding:13px 12px 70px}
  #pulse{grid-template-columns:repeat(5,1fr)}
  .g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}
  h1.pg{font-size:20px}
  #gsearchinput span.hint{display:none}
  .bmsg{max-width:96%}
}
@media (max-width:520px){.g3,.g4{grid-template-columns:1fr 1fr}#pulse{grid-template-columns:repeat(5,1fr)}}
@media print{body{background:#fff}}
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <div id="brand"><div class="b1">WORK UNIVERSE</div><div class="b2">MedStar Portfolio Command</div></div>
    <nav id="nav"></nav>
  </aside>
  <div id="sideveil" onclick="closeMenu()"></div>
  <div id="mainwrap">
    <div id="topbar">
      <button id="menubtn" onclick="openMenu()">☰</button>
      <div id="gsearchinput"><span>⌕</span><span class="mut2">Search the universe…</span><span class="hint mut2" style="margin-left:auto;font-size:10px">Ctrl K</span></div>
      <button class="tbtn" id="micbtn" title="Voice">🎙</button>
      <button class="tbtn" id="briefbtn" title="Morning briefing">☀</button>
      <span id="cloudchip">LOCAL</span>
    </div>
    <main id="main"></main>
  </div>
</div>
<div id="sov"><div id="sbox"><input id="sinput" placeholder="Search hospitals, projects, vendors, invoices, emails, risks…"><div id="sres"></div></div></div>
<div id="modalveil"><div id="modalbox"></div></div>
<div id="toasts"></div>
<script>
/* ============================ UTILITIES ============================ */
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const nowISO=()=>new Date().toISOString();
const todayISO=()=>new Date().toISOString().slice(0,10);
const uid=(p="x")=>p+"-"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}
const fmtD=d=>{if(!d)return"—";try{return new Date(d.length<=10?d+"T12:00:00":d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}catch(e){return d}};
const fmtDT=d=>{if(!d)return"—";try{return new Date(d).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}catch(e){return d}};
const fmt$=n=>n==null?"—":"$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:0});
const isPast=d=>!!d&&d.slice(0,10)<todayISO();
const daysUntil=d=>{if(!d)return null;return Math.round((new Date(d.slice(0,10)+"T12:00:00")-new Date(todayISO()+"T12:00:00"))/864e5)};
const daysFrom=d=>{if(!d)return null;return Math.round((new Date(todayISO()+"T12:00:00")-new Date(d.slice(0,10)+"T12:00:00"))/864e5)};
function toast(msg,kind=""){const t=document.createElement("div");t.className="toast "+kind;t.textContent=msg;
  $("#toasts").appendChild(t);setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.remove(),300)},4200)}
function motionOff(){return window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches}

/* ============================ STORE (device-first, cloud-mirrored) ============================ */
const Store={
  env:(typeof window!=="undefined"&&window.storage)?"claude":"local",
  hasClaude:(typeof window!=="undefined"&&!!window.storage),
  async localGet(k){
    if(this.hasClaude){try{const r=await window.storage.get(k);if(r&&r.value!=null)return r.value}catch(e){}}
    try{return localStorage.getItem(k)}catch(e){return null}
  },
  async localSet(k,s){
    if(this.hasClaude){try{await window.storage.set(k,s);return true}catch(e){}}
    try{localStorage.setItem(k,s);return true}catch(e){toast("Local save failed (storage full?). Export a backup.","err");return false}
  },
  async get(k){
    if(this.env==="cloud"){try{const v=await CLOUD.kv("GET",k);if(v!=null)return v}catch(e){CLOUD.down=true;cloudChip()}}
    const s=await this.localGet(k);if(s==null)return null;
    try{return JSON.parse(s)}catch(e){return s}
  },
  async set(k,v){
    const s=JSON.stringify(v);
    const ok=await this.localSet(k,s);
    if(this.env==="cloud"){CLOUD.kv("SET",k,v).then(()=>{if(CLOUD.down){CLOUD.down=false;cloudChip()}}).catch(()=>{CLOUD.down=true;cloudChip()})}
    return ok;
  },
  async del(k){
    if(this.hasClaude){try{await window.storage.delete(k)}catch(e){}}
    try{localStorage.removeItem(k)}catch(e){}
    if(this.env==="cloud"){CLOUD.kv("DEL",k).catch(()=>{})}
  }
};

const IDP={hospital:"h",project:"p",vendor:"v",person:"pe",email:"em",document:"doc",workorder:"wo",invoice:"inv",asset:"as",risk:"rk",action:"ac",note:"nt",deficiency:"df",requirement:"rq",evidence:"ev2",calevent:"ce",report:"rp"};
function col(type){const m={hospital:"hospitals",project:"projects",vendor:"vendors",person:"people",email:"emails",document:"documents",workorder:"workOrders",invoice:"invoices",asset:"assets",risk:"risks",action:"actions",note:"notes",deficiency:"deficiencies",requirement:"requirements",evidence:"evidence",calevent:"calEvents",report:"reports"};return m[type]}
function typeOf(id){return id?String(id).split("-")[0].replace(/^h$/,"hospital").replace(/^p$/,"project").replace(/^v$/,"vendor").replace(/^pe$/,"person").replace(/^em$/,"email").replace(/^doc$/,"document").replace(/^wo$/,"workorder").replace(/^inv$/,"invoice").replace(/^as$/,"asset").replace(/^rk$/,"risk").replace(/^ac$/,"action").replace(/^nt$/,"note").replace(/^df$/,"deficiency").replace(/^rq$/,"requirement").replace(/^ev2$/,"evidence").replace(/^ce$/,"calevent").replace(/^rp$/,"report"):null}
function rec(id){if(!id)return null;for(const t of Object.keys(ENT)){const c=DB[col(t)];if(!c)continue;const r=c.find(x=>x.id===id);if(r)return r}return null}
function nameOf(r){return r?(r.title||r.name||r.subject||(r.number&&("#"+r.number))||r.id):"—"}
function addRec(type,data,src="user"){
  const r=Object.assign({id:uid(IDP[type]||"x"),createdAt:nowISO(),updatedAt:nowISO()},data);
  (DB[col(type)]=DB[col(type)]||[]).push(r);
  audit("create",type,r.id,nameOf(r),src);saveDB();return r;
}
function updRec(id,patch,src="user"){
  const r=rec(id);if(!r)return null;Object.assign(r,patch,{updatedAt:nowISO()});
  audit("update",typeOf(id),id,Object.keys(patch).join(", "),src);saveDB();return r;
}
function delRec(id){
  const t=typeOf(id),c=DB[col(t)];if(!c)return;
  const i=c.findIndex(x=>x.id===id);if(i>-1)c.splice(i,1);
  DB.links=DB.links.filter(l=>linkA(l)!==id&&linkB(l)!==id);
  audit("delete",t,id,"removed");saveDB();
}
/* embedded, cloud-synced note log on any record — feeds the Brain snapshot */
function addNote(id,text){text=(text||"").trim();if(!text)return null;
  const r=rec(id);if(!r)return null;
  (r.noteLog=r.noteLog||[]).push({id:uid("n"),at:nowISO(),text});r.updatedAt=nowISO();
  audit("note",typeOf(id),id,text.slice(0,60));saveDB();return r;}
function delNote(id,noteId){const r=rec(id);if(!r||!r.noteLog)return;
  r.noteLog=r.noteLog.filter(n=>n.id!==noteId);r.updatedAt=nowISO();saveDB();}
function noteCount(r){return (r&&r.noteLog&&r.noteLog.length)||0}
/* links — defensive read: supports {a,b}, {from,to}, [a,b] */
const linkA=l=>Array.isArray(l)?l[0]:(l.a||l.from||l.source);
const linkB=l=>Array.isArray(l)?l[1]:(l.b||l.to||l.target);
function addLink(a,b,src="user"){
  if(!a||!b||a===b)return;
  if(DB.links.some(l=>(linkA(l)===a&&linkB(l)===b)||(linkA(l)===b&&linkB(l)===a)))return;
  DB.links.push({a,b,at:nowISO(),src});saveDB();
}
function linked(id,type){
  const out=[];for(const l of DB.links){let o=null;
    if(linkA(l)===id)o=linkB(l);else if(linkB(l)===id)o=linkA(l);
    if(!o)continue;if(type&&typeOf(o)!==type)continue;
    const r=rec(o);if(r)out.push(r);
  }return out;
}
function hospOf(id){if(!id)return null;if(typeOf(id)==="hospital")return rec(id);
  const r=rec(id);if(r&&r.hospitalId)return rec(r.hospitalId);
  return linked(id,"hospital")[0]||null;
}
function byHosp(arr,hid){return (arr||[]).filter(r=>r.hospitalId===hid||linked(r.id,"hospital").some(h=>h.id===hid))}
function chip(r){const t=typeOf(r.id);return `<span class="chip" onclick="event.stopPropagation();go('#/e/${t}/${r.id}')"><span style="color:${ENT[t].color}">${ENT[t].icon}</span>${esc(nameOf(r)).slice(0,38)}</span>`}
function chips(list){return `<div class="pillrow">${(list||[]).map(chip).join("")||'<span class="xs mut2">No connections yet.</span>'}</div>`}

const PROJ_FLOW=["Planning","Design","Procurement","In Progress","On Hold","Closeout","Complete"];
const PROJ_CATS=["HVAC & Chillers","Boilers & Steam","BAS & Controls","Electrical & Power","Fire & Life Safety","Plumbing & Water","Building Envelope","Medical Gas","Equipment Rental","Other"];
const INV_FLOW=["Uploaded","Matched","Pending Approval","Approved","Sent to AP","Paid","Archived"];
const SEV={critical:3,high:2,medium:1,low:0};
function sevClass(s){return s==="critical"||s==="high"?"crit":s==="medium"?"warn":"ok"}
function statBadge(s){
  if(!s)return '<span class="stat s-dim">—</span>';
  const m={"Complete":"ok","Closeout":"info","Done":"ok","Closed":"ok","Paid":"ok","Verified":"ok","Completed":"ok","Active":"info","In Progress":"info","Open":"warn","Planning":"dim","Design":"dim","Procurement":"info","On Hold":"warn","Stuck — Vendor":"crit","Waiting":"warn","critical":"crit","high":"crit","medium":"warn","low":"ok","Approved":"info","Pending Approval":"warn","Sent to AP":"info","Uploaded":"dim","Matched":"info","Archived":"dim","Request":"dim","Assigned":"info"};
  return `<span class="stat s-${m[s]||"dim"}">${esc(s)}</span>`;
}
function openProjects(){return DB.projects.filter(p=>!["Complete"].includes(p.status))}
function projOverdue(p){return p.due&&isPast(p.due)&&!["Complete","Closeout"].includes(p.status)}
function projHealth(p){
  if(projOverdue(p))return"crit";
  if(p.status==="Stuck — Vendor")return"crit";
  if(p.status==="On Hold"||(p.priority==="Critical"&&p.status!=="Complete"))return"warn";
  if(p.due&&daysUntil(p.due)!=null&&daysUntil(p.due)<=7&&p.status!=="Complete")return"warn";
  return"ok";
}
function openInvs(){return DB.invoices.filter(i=>!["Paid","Archived"].includes(i.status))}
function openWOs(){return (DB.workOrders||[]).filter(w=>!["Completed","Verified","Closed"].includes(w.status))}
function hospSeverity(h){
  const ps=byHosp(DB.projects,h.id);
  if(ps.some(p=>projHealth(p)==="crit")||byHosp(DB.risks,h.id).some(r=>r.status==="Open"&&r.severity==="critical"))return"crit";
  if(ps.some(p=>projHealth(p)==="warn")||byHosp(DB.actions,h.id).some(a=>a.status==="Open"&&isPast(a.due))||byHosp(openInvs(),h.id).some(i=>isPast(i.dueDate)))return"warn";
  return"ok";
}

function seed(){
  if(DB.meta.seeded)return;
  HOSP_SEED.forEach(([code,name])=>{if(!DB.hospitals.some(h=>h.code===code))DB.hospitals.push({id:uid("h"),code,name,director:"",createdAt:nowISO(),updatedAt:nowISO(),seeded:true})});
  DB.meta.seeded=true;
}
/* one-time migrations so existing records keep working */
function migrate(){
  Object.keys(blankDB()).forEach(k=>{if(DB[k]===undefined)DB[k]=k==="meta"?{version:1}:[]});
  DB.projects.forEach(p=>{
    if(!p.status)p.status="In Progress";
    if(p.status==="Active")p.status="In Progress";
    if(!PROJ_FLOW.includes(p.status)&&p.status!=="Stuck — Vendor")p.status="In Progress";
    if(!p.category)p.category="Other";
    if(p.due===undefined)p.due=p.due||null;
  });
  if(DB.hospitals.length===0){DB.meta.seeded=false;seed();}
  purgeCompliance();
  reconcileLinks();
}
/* Make the knowledge graph reflect reality: every record that names a hospital in its field gets an
   explicit link to that hospital, so nothing sits alone. Idempotent — addLink dedupes, so this is a
   no-op once everything's wired. Covers projects, notes, vendors, people, assets, risks, actions,
   invoices, emails, documents, calendar events — everything that can belong to a site. */
function reconcileLinks(){
  let made=0;const before=DB.links.length;
  Object.keys(ENT).forEach(t=>{
    if(t==="hospital")return;const c=DB[col(t)];if(!c)return;
    c.forEach(r=>{if(r.hospitalId&&rec(r.hospitalId)){
      const had=DB.links.length;addLink(r.id,r.hospitalId,"reconcile");if(DB.links.length>had)made++;}});
  });
  if(DB.links.length!==before){reconcileLinks.lastCount=made;audit("reconcile",null,null,"Linked "+made+" record(s) into the graph");saveDB();}
  return made;
}
/* one-time, idempotent: compliance is gone from this OS — delete every requirement/deficiency/evidence
   record and any link touching one, for every hospital. Nothing creates these anymore, so after the
   first load this is a no-op forever, and the wipe survives cloud sync across devices. */
function purgeCompliance(){
  const dead=new Set();
  ["requirements","deficiencies","evidence"].forEach(k=>{(DB[k]||[]).forEach(r=>dead.add(r.id));DB[k]=[]});
  if(!dead.size)return 0;
  DB.links=DB.links.filter(l=>!dead.has(linkA(l))&&!dead.has(linkB(l)));
  audit("purge",null,null,"Removed "+dead.size+" compliance item(s) from memory");saveDB();
  purgeCompliance.lastCount=dead.size;
  return dead.size;
}
/* ============================ CLOUD SYNC (Supabase · table: universe_store) ============================ */
const CLOUD={url:"",key:"",email:"",token:"",refresh:"",userId:"",down:false,lastErr:"",lastSync:"",
  configured(){return!!(this.url&&this.key)},
  signedIn(){return!!this.token},
  hdr(){return{"apikey":this.key,"Authorization":"Bearer "+this.token,"Content-Type":"application/json"}},
  persist(){try{localStorage.setItem("wuos:sess",JSON.stringify({t:this.token,r:this.refresh,e:this.email,u:this.userId,url:this.url,key:this.key}))}catch(e){}},
  async signIn(email,password){
    const r=await fetch(this.url.replace(/\/$/,"")+"/auth/v1/token?grant_type=password",{
      method:"POST",headers:{"apikey":this.key,"Content-Type":"application/json"},
      body:JSON.stringify({email,password})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(j.error_description||j.msg||j.message||"Sign-in failed — check email/password (create the user in Supabase → Authentication → Users).");
    this.token=j.access_token;this.refresh=j.refresh_token;this.email=email;this.userId=(j.user&&j.user.id)||"";
    this.persist();return true;
  },
  async refreshToken(){
    if(!this.refresh)return false;
    try{const r=await fetch(this.url.replace(/\/$/,"")+"/auth/v1/token?grant_type=refresh_token",{
      method:"POST",headers:{"apikey":this.key,"Content-Type":"application/json"},
      body:JSON.stringify({refresh_token:this.refresh})});
      const j=await r.json().catch(()=>({}));if(!r.ok)return false;
      this.token=j.access_token;this.refresh=j.refresh_token||this.refresh;this.persist();
      return true;
    }catch(e){return false}
  },
  async kv(method,key,val,retried){
    if(!this.configured()||!this.signedIn())throw new Error("Cloud not connected");
    const base=this.url.replace(/\/$/,"")+"/rest/v1/universe_store";
    let r;
    if(method==="GET")r=await fetch(base+"?key=eq."+encodeURIComponent(key)+"&select=data",{headers:this.hdr()});
    else if(method==="SET")r=await fetch(base+"?on_conflict=user_id,key",{method:"POST",
      headers:Object.assign(this.hdr(),{"Prefer":"resolution=merge-duplicates,return=minimal"}),
      body:JSON.stringify([{key,data:val,updated_at:nowISO()}])});
    else if(method==="DEL")r=await fetch(base+"?key=eq."+encodeURIComponent(key),{method:"DELETE",headers:this.hdr()});
    if((r.status===401||r.status===403)&&!retried&&await this.refreshToken())return this.kv(method,key,val,true);
    if(!r.ok){const t=await r.text().catch(()=>"");
      this.lastErr=r.status+" "+t.slice(0,160);
      if(r.status===404||(/universe_store/.test(t)&&/not exist|relation/.test(t)))throw new Error("Cloud table missing. Run the setup SQL in Supabase (Settings → setup SQL), then Connect again.");
      if(r.status===401||r.status===403)throw new Error("Login expired and couldn't refresh — open Settings → Cloud Sync and Connect again.");
      throw new Error("Cloud "+r.status+": "+(t.slice(0,140)||"write rejected"));}
    this.lastErr="";this.lastSync=nowISO();
    if(method==="GET"){const j=await r.json();return j&&j[0]?j[0].data:null}
    return true;
  },
  async test(){
    // live write + read-back roundtrip; returns a plain-English result
    const probe={ping:nowISO(),by:this.email};
    await this.kv("SET","wuos:probe",probe);
    const got=await this.kv("GET","wuos:probe");
    if(!got||got.ping!==probe.ping)throw new Error("Wrote, but read back nothing — check the table's RLS policies (re-run the setup SQL).");
    return "Write + read-back OK as "+this.email;
  },
  signOut(){this.token="";this.refresh="";this.userId="";try{localStorage.removeItem("wuos:sess")}catch(e){}}
};
function cloudChip(){const c=$("#cloudchip");if(!c)return;
  if(Store.env==="cloud"&&CLOUD.down){c.textContent="CLOUD · RETRYING";c.className="warn";c.title=CLOUD.lastErr||"";return}
  if(Store.env==="cloud"){c.textContent="CLOUD SYNC";c.className="on";c.title=CLOUD.lastSync?"Last sync "+fmtDT(CLOUD.lastSync):"";return}
  c.textContent=Store.hasClaude?"CLAUDE STORE":"LOCAL";c.className="";
}
async function testCloud(){
  if(!CLOUD.configured()){toast("Enter the Cloud Sync values and Connect first","am");return}
  if(!CLOUD.signedIn()){toast("Connect & Sign In first","am");return}
  toast("Testing cloud roundtrip…");
  try{const msg=await CLOUD.test();CLOUD.down=false;cloudChip();toast("✓ "+msg,"ok");render();}
  catch(e){CLOUD.down=true;cloudChip();toast("✗ "+e.message,"err");render();}
}
async function cloudConnect(){
  const url=$("#cl_url").value.trim(),key=$("#cl_key").value.trim(),email=$("#cl_email").value.trim(),pw=$("#cl_pw").value;
  if(!url||!key||!email||!pw){toast("All four values are required","am");return}
  CLOUD.url=url;CLOUD.key=key;
  SETTINGS.cloudUrl=url;SETTINGS.cloudKey=key;SETTINGS.cloudEmail=email;saveSettings();
  try{await CLOUD.signIn(email,pw)}catch(e){toast(e.message,"err");return}
  try{await CLOUD.kv("GET",DB_KEY)}catch(e){toast(e.message,"err");cloudChip();render();return}
  Store.env="cloud";CLOUD.down=false;cloudChip();
  const cloudCore=await CLOUD.kv("GET",DB_KEY).catch(()=>null);
  const localCore=await Store.localGet(DB_KEY);
  if(!cloudCore&&localCore){
    if(confirm("Cloud is empty. Upload this device's data to the cloud now?"))await cloudPush();
  } else if(cloudCore){
    if(confirm("Cloud already has data. Load it onto this device now? (This device's current copy stays in its local mirror.)"))await cloudPull();
  }
  toast("Cloud sync connected","ok");render();
}
async function cloudPush(){
  await Store.set(DB_KEY,DB);await Store.set(AUDIT_KEY,AUDIT);await Store.set(SET_KEY,SETTINGS);
  for(const d of DB.documents.filter(x=>x.hasFile)){
    const f=await Store.localGet("wuos:file:"+d.id);
    if(f){try{await CLOUD.kv("SET","wuos:file:"+d.id,JSON.parse(f))}catch(e){}}
  }
  toast("Everything pushed to cloud","ok");audit("cloud",null,null,"Pushed full memory to cloud");
}
async function cloudPull(){
  const c=await CLOUD.kv("GET",DB_KEY).catch(e=>{toast(e.message,"err");return null});
  if(!c){toast("Cloud has no data yet — use Push to Cloud first","am");return}
  DB=c;AUDIT=await CLOUD.kv("GET",AUDIT_KEY).catch(()=>null)||[];
  const st=await CLOUD.kv("GET",SET_KEY).catch(()=>null);if(st)SETTINGS=Object.assign(defSettings(),st);
  await Store.localSet(DB_KEY,JSON.stringify(DB));await Store.localSet(AUDIT_KEY,JSON.stringify(AUDIT));await Store.localSet(SET_KEY,JSON.stringify(SETTINGS));
  migrate();
  toast("Pulled latest from cloud","ok");render();
}
function cloudSignOut(){CLOUD.signOut();Store.env=Store.hasClaude?"claude":"local";cloudChip();toast("Signed out — saving locally","am");render()}

/* ============================ LOCAL SEARCH & BRAIN SNAPSHOT ============================ */
const SEARCH_TYPES=["hospital","project","vendor","person","email","document","invoice","asset","risk","action","note","calevent"];
function localSearch(q,max=28){
  q=(q||"").toLowerCase().trim();const out=[];
  for(const t of SEARCH_TYPES){
    for(const r of (DB[col(t)]||[])){
      const hay=[nameOf(r),r.summary,r.text,r.body,r.owner,r.vendorName,r.code,r.category,r.status].filter(Boolean).join(" ").toLowerCase();
      if(!q||hay.includes(q)){out.push({t,r});if(out.length>=max*3)break}
    }
  }

function snapshotFor(query,max=34){
  const hits=localSearch(query,max);
  const base=hits.length?hits.map(x=>x.r):[];
  const extra=[...DB.risks.filter(r=>r.status==="Open"&&(r.severity==="critical"||r.severity==="high")),
    ...DB.actions.filter(a=>a.status==="Open"&&isPast(a.due)),
    ...openProjects().filter(p=>projHealth(p)!=="ok"),
    ...DB.invoices.filter(i=>!["Paid","Archived"].includes(i.status)&&isPast(i.dueDate))].slice(0,12);
  const seen=new Set(),rows=[];
  for(const r of [...base,...extra]){if(seen.has(r.id))continue;seen.add(r.id);
    const t=typeOf(r.id),h=hospOf(r.id);
    const notes=(r.noteLog||[]).slice(-4).map(n=>"("+fmtD(n.at)+") "+n.text).join(" || ");
    rows.push("["+r.id+"] "+(ENT[t]?ENT[t].label:t)+" | "+(h?h.code+" | ":"")+
      [nameOf(r),r.status,r.phase,r.category,r.severity,r.owner&&("owner:"+r.owner),r.due&&("due:"+r.due),r.dueDate&&("due:"+r.dueDate),r.amount!=null&&fmt$(r.amount),r.vendorName,(r.summary||r.body||r.text||"").slice(0,180),notes&&("NOTES: "+notes)].filter(Boolean).join(" | "));
    if(rows.length>=max+12)break;
  }
  let out=rows.join("\n");
  // EMAIL INTEL — every email on file, so the Brain always has the full picture
  const emails=DB.emails.slice().sort((a,b)=>(b.urgency||0)-(a.urgency||0)).slice(0,40).map(e=>{const h=hospOf(e.id);
    const notes=(e.noteLog||[]).slice(-2).map(n=>n.text).join(" || ");
    return "["+e.id+"] "+(h?h.code+" | ":"")+"urgency "+(e.urgency||1)+" | "+(e.subject||"(no subject)")+" — "+((e.summary||e.body||"").slice(0,220))+(notes?" | NOTES: "+notes:"");});
  if(emails.length)out+="\n\n--- EMAIL INTEL ("+DB.emails.length+" on file) ---\n"+emails.join("\n");
  return out;
}

function parseAIJSON(raw){
  if(!raw)return null;
  let s=String(raw).replace(/```json|```/g,"").trim();
  const ob=s.indexOf("{"),oa=s.indexOf("[");
  let start=-1,close="}";
  if(oa>=0&&(ob<0||oa<ob)){start=oa;close="]"}else if(ob>=0){start=ob;close="}"}
  if(start<0)return null;
  const end=s.lastIndexOf(close);if(end<=start)return null;
  s=s.slice(start,end+1);
  try{return JSON.parse(s)}catch(e){
    try{return JSON.parse(s.replace(/,\s*([}\]])/g,"$1"))}catch(e2){return null}
  }
}

  let obj=parseAIJSON(await AI([{role:"user",content:blocks}],{system:sys,max:1800}));

function salvageStrings(buf){
  const b=new Uint8Array(buf),out=[];
  for(const off of [0,1]){
    let u="";for(let i=off;i+1<b.length;i+=2){const c=b[i],n=b[i+1];
      if(n===0&&c>=32&&c<127)u+=String.fromCharCode(c);else{if(u.length>=4)out.push(u);u=""}}
    if(u.length>=4)out.push(u);
  }
  let a="";for(let i=0;i<b.length;i++){const c=b[i];if(c>=32&&c<127)a+=String.fromCharCode(c);else{if(a.length>=6)out.push(a);a=""}}
  if(a.length>=6)out.push(a);
  const seen=new Set(),keep=[];
  for(const s of out){const k=s.trim();if(k.length<4||seen.has(k))continue;seen.add(k);keep.push(k)}
  return keep.join("\n");
}
function fileToBlocks(file){
  return new Promise((res,rej)=>{
    const isImg=/^image\//.test(file.type),isPdf=file.type==="application/pdf";
    const isBinaryDoc=/\.(msg|doc|xls|ppt)$/i.test(file.name)&&!/\.(docx|xlsx|pptx)$/i.test(file.name);
    const fr=new FileReader();
    fr.onerror=()=>rej(new Error("Read failed"));
    if(isImg||isPdf){fr.onload=()=>{const b64=String(fr.result).split(",")[1];
      res({blocks:[isPdf?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}:{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:"Extract operations intelligence from this "+(isPdf?"PDF":"photo")+" named "+file.name}],raw:{b64,media:file.type}})};
      fr.readAsDataURL(file);return}
    if(isBinaryDoc){fr.onload=()=>{const text=salvageStrings(fr.result);
      if(text.trim().length<25){rej(new Error("Couldn't read text out of "+file.name+". In Outlook open the email and Save As → .txt or .eml, or just paste the body into the box below."));return}
      res({blocks:[{type:"text",text:"OUTLOOK/OFFICE FILE ("+file.name+") — recovered text:\n\n"+text.slice(0,14000)}],raw:{text}})};
      fr.readAsArrayBuffer(file);return}
    fr.onload=()=>{const t=String(fr.result).slice(0,14000);
      res({blocks:[{type:"text",text:"FILE: "+file.name+"\n\n"+t}],raw:{text:String(fr.result)}})};
    fr.readAsText(file);
  });
}

}

/* ---------- knowledge graph (d3) ---------- */
const GRAPH={expanded:new Set(),isolate:null,q:""};
Views.graph=()=>`<div class="view"><div class="pghead"><div class="grow"><div class="eyebrow am">Memory</div><h1 class="pg">Knowledge Graph</h1>
  <div class="pgsub">${DB.links.length} live connections. Tap a node to inspect; drag to untangle.</div></div>
  <input style="max-width:220px" placeholder="Highlight…" oninput="GRAPH.q=this.value;drawGraph()"></div>
  <div id="gwrap"><svg id="gsvg"></svg><div id="ginfo"></div></div></div>`;
const GRAPH_HIDE=new Set(["requirement","deficiency","evidence"]); // compliance items never appear on the map
function graphData(){
  const ids=new Set();
  DB.hospitals.forEach(h=>ids.add(h.id));
  DB.links.forEach(l=>{ids.add(linkA(l));ids.add(linkB(l))});
  // pull in every record that names a hospital, so the graph reflects all data — projects, emails, invoices, risks, vendors…
  const hospEdges=[];
  Object.keys(ENT).forEach(t=>{
    if(t==="hospital"||GRAPH_HIDE.has(t))return;const c=DB[col(t)];if(!c)return;
    c.forEach(r=>{if(r.hospitalId&&rec(r.hospitalId)){ids.add(r.id);hospEdges.push([r.id,r.hospitalId])}});
  });
  const nodes=[...ids].map(id=>{const r=rec(id);if(!r)return null;const t=typeOf(id);
    if(GRAPH_HIDE.has(t))return null;
    return {id,t,label:nameOf(r).slice(0,22)}}).filter(Boolean);
  const have=new Set(nodes.map(n=>n.id));
  const seen=new Set(),links=[];
  const push=(a,b)=>{if(!have.has(a)||!have.has(b)||a===b)return;const k=a<b?a+"|"+b:b+"|"+a;if(seen.has(k))return;seen.add(k);links.push({source:a,target:b})};
  DB.links.forEach(l=>push(linkA(l),linkB(l)));
  hospEdges.forEach(([a,b])=>push(a,b));
  return{nodes,links};
}
function drawGraph(){
  const svg=d3.select("#gsvg");if(svg.empty())return;svg.selectAll("*").remove();
  const{nodes,links}=graphData();const q=(GRAPH.q||"").toLowerCase();
  const W=svg.node().clientWidth||900,H=svg.node().clientHeight||520;
  if(!nodes.length){svg.append("text").attr("x",W/2).attr("y",H/2).attr("text-anchor","middle").text("Feed the universe through Ingest and the map grows here.");return}
  const adj={};links.forEach(l=>{(adj[l.source]=adj[l.source]||new Set()).add(l.target);(adj[l.target]=adj[l.target]||new Set()).add(l.source)});
  const inPath=id=>!GRAPH.isolate||id===GRAPH.isolate||(adj[GRAPH.isolate]&&adj[GRAPH.isolate].has(id));
  const sim=d3.forceSimulation(nodes).force("link",d3.forceLink(links).id(d=>d.id).distance(64))
    .force("charge",d3.forceManyBody().strength(-150)).force("center",d3.forceCenter(W/2,H/2)).force("collide",d3.forceCollide(22));
  const link=svg.append("g").selectAll("line").data(links).join("line")
    .attr("stroke","#22304f").attr("stroke-width",1).attr("opacity",d=>inPath(d.source.id||d.source)&&inPath(d.target.id||d.target)?0.8:0.12);
  const node=svg.append("g").selectAll("g").data(nodes).join("g").style("cursor","pointer")
    .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.25).restart();d.fx=d.x;d.fy=d.y})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
    .on("click",(e,d)=>showGInfo(d.id));
  node.append("circle").attr("r",d=>d.t==="hospital"?15:9)
    .attr("fill",d=>ENT[d.t]?ENT[d.t].color:"#888").attr("opacity",d=>inPath(d.id)?(q&&!d.label.toLowerCase().includes(q)?.25:1):.15)
    .attr("stroke",d=>GRAPH.isolate===d.id?"#fff":"rgba(255,255,255,.25)")
    .attr("stroke-width",d=>GRAPH.isolate===d.id?2:1)
    .style("filter",d=>"drop-shadow(0 0 6px "+(ENT[d.t]?ENT[d.t].color:"#888")+"66)");
  node.append("text").attr("dy",d=>d.t==="hospital"?28:20).attr("text-anchor","middle").text(d=>d.label)
    .attr("opacity",d=>q&&!d.label.toLowerCase().includes(q)?.22:1);
  sim.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);node.attr("transform",d=>`translate(${d.x},${d.y})`)});
}
function showGInfo(id){
  const r=rec(id);if(!r)return;const lk=linked(id).slice(0,8);
  $("#ginfo").innerHTML=`<div class="panel tight rail-c"><div class="eyebrow" style="color:${ENT[typeOf(id)].color};margin-bottom:4px">${ENT[typeOf(id)].label}</div>
  <b>${esc(nameOf(r))}</b><div class="xs mut" style="margin:4px 0">${esc((r.summary||"").slice(0,110))}</div>

  <button class="btn sm" onclick="GRAPH.isolate=GRAPH.isolate==='${id}'?null:'${id}';drawGraph()">${GRAPH.isolate===id?"Un-isolate":"Isolate"}</button></div></div>`;
}

function projHeatBand(p){
  if(projOverdue(p)||p.status==="Stuck — Vendor")return 0;
  if((p.due&&daysUntil(p.due)<=7)||p.status==="On Hold"||p.priority==="Critical")return 1;
  if(p.due&&daysUntil(p.due)<=30)return 2;
  return 3;
}
const RADAR_BANDS=[["Overdue / Stuck","crit"],["≤ 7 days · Held · Critical","warn"],["≤ 30 days","info"],["On track","ok"]];
function hashFrac(s,salt){let h=2166136261;s=String(s);for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}h=(h+Math.imul(salt,2654435761))>>>0;return h/4294967296}
function radarBlip(id){
  const p=rec(id);if(!p)return;const h=hospOf(id);
  openModal(`<div class="eyebrow" style="color:${ENT.project.color};margin-bottom:5px">◧ Project${h?" · "+esc(h.code):""}</div>
  <b style="font-size:16px">${esc(p.title)}</b>

  <div class="xs" style="margin:4px 0"><span class="mut2">Due:</span> <span class="mono" style="${projOverdue(p)?'color:var(--crit)':''}">${fmtD(p.due)}${projOverdue(p)?" — OVERDUE":""}</span> &nbsp; <span class="mut2">Owner:</span> ${esc(p.owner||"—")}</div>

function radarSVG(sectors,opts={}){
  const CX=300,CY=300,R=250;
  const ringR=[62,125,187,250],bandR=[[20,56],[70,119],[133,181],[195,244]];
  const N=sectors.length,sec=360/N;
  const pt=(ang,r)=>{const a=(ang-90)*Math.PI/180;return[(CX+r*Math.cos(a)).toFixed(1),(CY+r*Math.sin(a)).toFixed(1)]};
  let s=`<svg viewBox="0 0 600 632" style="width:100%;max-height:68vh;display:block">`;
  s+=`<circle cx="${CX}" cy="${CY}" r="${ringR[3]}" fill="rgba(63,182,139,.04)"/><circle cx="${CX}" cy="${CY}" r="${ringR[2]}" fill="rgba(110,163,207,.05)"/><circle cx="${CX}" cy="${CY}" r="${ringR[1]}" fill="rgba(232,163,61,.07)"/><circle cx="${CX}" cy="${CY}" r="${ringR[0]}" fill="rgba(228,89,107,.10)"/>`;
  ringR.forEach(r=>s+=`<circle cx="${CX}" cy="${CY}" r="${r}" fill="none" stroke="#1c2842" stroke-width="1"/>`);
  for(let i=0;i<N;i++){const[x,y]=pt(i*sec,R);s+=`<line x1="${CX}" y1="${CY}" x2="${x}" y2="${y}" stroke="#16213c" stroke-width="1"/>`}
  if(!motionOff())s+=`<g class="sweepg"><path d="M300,300 L300,50 A250,250 0 0 1 409.6,75.3 Z" fill="rgba(232,163,61,.06)"/><line x1="300" y1="300" x2="300" y2="50" stroke="rgba(232,163,61,.45)" stroke-width="1.5"/></g>`;
  s+=`<circle cx="${CX}" cy="${CY}" r="3.5" fill="var(--amber)"/>`;
  sectors.forEach((S,i)=>{
    const mid=(i+0.5)*sec;const[lx,ly]=pt(mid,272);
    s+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" class="rlab ${S.items.length?"":"dim"}" ${S.click?`onclick="${S.click}"`:""}>${esc(S.label)}</text>`;
    S.items.forEach(p=>{
      const b=projHeatBand(p),[r0,r1]=bandR[b];
      const ang=i*sec+sec*(0.16+0.68*hashFrac(p.id,1));
      const r=r0+(r1-r0)*hashFrac(p.id,2);
      const[x,y]=pt(ang,r);
      const cl=projHealth(p),colr=cl==="crit"?"var(--crit)":cl==="warn"?"var(--amber)":"var(--ok)";
      s+=`<g class="blip ${b===0&&!motionOff()?"hot":""}" onclick="radarBlip('${p.id}')"><circle cx="${x}" cy="${y}" r="14" fill="transparent"/><circle class="vis" cx="${x}" cy="${y}" r="${p.priority==="Critical"?7:5.5}" fill="${colr}" stroke="rgba(255,255,255,.3)" stroke-width="1" style="filter:drop-shadow(0 0 6px ${colr})"/></g>`;
    });
  });
  s+=`</svg>`;return s;
}

function closeModal(){$("#modalveil").classList.remove("open")}
const FORMS={
  project:[["title","text"],["hospitalId","hospital"],["status",PROJ_FLOW.concat(["Stuck — Vendor"])],["category",PROJ_CATS],["priority",["Critical","High","Medium","Low"]],["due","date"],["owner","text"],["summary","textarea"]],
  risk:[["title","text"],["hospitalId","hospital"],["severity",["critical","high","medium","low"]],["status",["Open","Mitigated","Closed"]],["owner","text"],["summary","textarea"]],
  action:[["title","text"],["hospitalId","hospital"],["owner","text"],["due","date"],["status",["Open","Done"]]],
  vendor:[["name","text"],["contact","text"],["phone","text"],["email","text"]],
  invoice:[["vendorName","text"],["number","text"],["hospitalId","hospital"],["amount","number"],["date","date"],["dueDate","date"],["status",INV_FLOW]],
  calevent:[["title","text"],["hospitalId","hospital"],["date","date"]],
  note:[["title","text"],["hospitalId","hospital"],["text","textarea"]]
};
function formField(k,spec,val){
  const v=val==null?"":val;
  if(spec==="textarea")return `<label class="f">${k}</label><textarea data-k="${k}" rows="3">${esc(v)}</textarea>`;
  if(spec==="hospital")return `<label class="f">Hospital</label><select data-k="${k}"><option value="">— portfolio / unassigned —</option>${DB.hospitals.map(h=>`<option value="${h.id}" ${v===h.id?"selected":""}>${esc(h.code)} — ${esc(h.name)}</option>`).join("")}</select>`;
  if(Array.isArray(spec))return `<label class="f">${k}</label><select data-k="${k}">${spec.map(o=>`<option ${v===o?"selected":""}>${esc(o)}</option>`).join("")}</select>`;
  return `<label class="f">${k}</label><input data-k="${k}" type="${spec==="date"?"date":spec==="number"?"number":"text"}" value="${esc(v)}">`;
}
function quickAdd(type){
  openModal(`<div class="eyebrow am" style="margin-bottom:6px">New ${ENT[type].label}</div>
    ${FORMS[type].map(([k,s])=>formField(k,s,"")).join("")}
    <div class="flexr" style="margin-top:13px"><button class="btn primary" onclick="saveQuick('${type}','')">Save</button></div>`);
}
function editRec(id){
  const type=typeOf(id),r=rec(id);if(!FORMS[type]||!r)return;
  openModal(`<div class="eyebrow am" style="margin-bottom:6px">Edit ${ENT[type].label}</div>
    ${FORMS[type].map(([k,s])=>formField(k,s,r[k])).join("")}
    <div class="flexr" style="margin-top:13px"><button class="btn primary" onclick="saveQuick('${type}','${id}')">Save</button></div>`);
}
function saveQuick(type,id){
  const data={};document.querySelectorAll("#modalbox [data-k]").forEach(el=>{
    let v=el.value;if(el.type==="number")v=v===""?null:Number(v);data[el.dataset.k]=v===""?null:v});
  if(!data.title&&!data.name&&!data.vendorName){toast("Give it a name","am");return}
  let r;
  if(id){r=updRec(id,data);if(data.hospitalId)addLink(id,data.hospitalId)}else{r=addRec(type,data);if(data.hospitalId)addLink(r.id,data.hospitalId)}
  closeModal();toast((id?"Updated":"Added")+" "+nameOf(r),"ok");render();
}
/* ============================ REPORTS ENGINE ============================ */
const DISCLAIMER="Generated from Work Universe OS memory. Verify against source systems (CMMS, AP, vendor records) before external distribution.";
function repHead(title,h){
  return `<div class="rh"><div class="rh1">MedStar Health Portfolio — Crothall Systems Maintenance</div>
  <h1>${esc(title)}</h1><div class="rh2">${h?esc(h.code)+" — "+esc(h.name)+" · ":""}Generated ${fmtD(todayISO())}</div></div>`;
}
function printDoc(html,title){
  const w=window.open("","_blank");
  if(!w){toast("Pop-up blocked — allow pop-ups for this site to print reports.","am");return}
  w.document.write(`<!doctype html><html><head><title>${esc(title)}</title><style>
  body{font:13px/1.55 Georgia,'Times New Roman',serif;color:#111;margin:34px 44px;max-width:860px}
  h1{font-size:21px;margin:4px 0 2px}h2{font-size:15px;margin:22px 0 6px;border-bottom:1.5px solid #333;padding-bottom:3px}
  h3{font-size:13.5px;margin:14px 0 4px}
  .rh{border-bottom:3px double #333;padding-bottom:8px;margin-bottom:16px}
  .rh1{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555}
  .rh2{font-size:11px;color:#555}
  table{width:100%;border-collapse:collapse;margin:8px 0 14px;font-size:12px}
  th{background:#eee;border:1px solid #999;padding:6px 8px;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:1px}
  td{border:1px solid #999;padding:7px 8px;vertical-align:top}
  .fill{min-height:20px}
  .lines div{border-bottom:1px solid #999;height:24px}
  .sigline{margin-top:26px;font-size:12px}
  .sig{display:inline-block;border-top:1px solid #333;min-width:260px;margin-right:40px;padding-top:3px}
  .disc{margin-top:22px;font-size:9.5px;color:#777;border-top:1px solid #ccc;padding-top:6px}
  .meta{font-size:11.5px;color:#333;margin:2px 0}
  .pagebreak{page-break-before:always}
  @media print{body{margin:14mm}}
  </style></head><body>${html}<script>setTimeout(()=>window.print(),350)<\/script></body></html>`);
  w.document.close();
  addRec("report",{title,kind:"print",summary:"Generated "+title},"user");
}

/* ---------- ★ MedStar Load Leveling — Director Intake ---------- */
function intakeSection(h,pageBreak){
  const assets=byHosp(DB.assets,h.id);
  const rows=[];
  assets.slice(0,14).forEach(a=>rows.push([nameOf(a),a.location||a.system||"",""]));
  while(rows.length<8)rows.push(["","",""]);
  return `${pageBreak?'<div class="pagebreak"></div>':""}
  <h2>${esc(h.code)} — ${esc(h.name)}</h2>
  <div class="meta"><b>Director:</b> ${h.director?esc(h.director):"_________________________________"} &nbsp;&nbsp; <b>Date:</b> ____________</div>
  <p style="font-size:12px">We are balancing preventive maintenance workloads evenly across the calendar so no week carries a spike the team cannot absorb. Before any schedule moves, list every critical asset at your site that must <b>not</b> be auto-leveled, where it lives, and exactly how its PMs must be handled. Individual director meetings follow these submissions — no PM changes happen before your meeting. Return by end of day <b>Monday, June 15, 2026</b>.</p>
  <h3>Section A — Critical Assets &amp; Load-Leveling Instructions</h3>
  <table><tr><th style="width:26%">Critical Asset</th><th style="width:24%">Location / System</th><th>Load-Leveling Instructions &amp; Expectations</th></tr>
  ${rows.map(r=>`<tr><td class="fill">${esc(r[0])}</td><td class="fill">${esc(r[1])}</td><td class="fill">${esc(r[2])}</td></tr>`).join("")}</table>
  <h3>Section B — Site-Specific Workflow Notes</h3>
  <p style="font-size:11.5px;color:#444;margin:2px 0 6px">Blackout periods, surveys, construction, shutdown lead times, seasonal constraints, staffing patterns — anything the leveling schedule must respect.</p>
  <div class="lines"><div></div><div></div><div></div><div></div><div></div></div>
  <div class="sigline"><span class="sig">Director Signature</span><span class="sig">Date</span></div>`;
}
function printIntake(){
  const sel=$("#rep_hosp")?$("#rep_hosp").value:"ALL";
  const hs=sel==="ALL"?DB.hospitals:DB.hospitals.filter(h=>h.id===sel);
  if(!hs.length){toast("No hospital selected","am");return}
  let html=repHead("MedStar PM Load Leveling — Director Intake",sel==="ALL"?null:hs[0]);
  html+=hs.map((h,i)=>intakeSection(h,i>0)).join("");
  html+=`<div class="disc">${esc(DISCLAIMER)} Prepared by: ${esc(SETTINGS.preparedBy)}</div>`;
  printDoc(html,"Load Leveling Director Intake");
}

/* ---------- Project Status Report ---------- */
function printProjectStatus(){
  const sel=$("#rep_hosp2")?$("#rep_hosp2").value:"ALL";
  const hs=sel==="ALL"?DB.hospitals:DB.hospitals.filter(h=>h.id===sel);
  let html=repHead("Project Status Report",sel==="ALL"?null:hs[0]);
  hs.forEach(h=>{
    const ps=byHosp(DB.projects,h.id);if(!ps.length)return;
    const od=ps.filter(projOverdue).length;
    html+=`<h2>${esc(h.code)} — ${ps.filter(p=>p.status!=="Complete").length} open${od?` · <span style="color:#b00">${od} overdue</span>`:""}</h2>
    <table><tr><th>Project</th><th>Category</th><th>Status</th><th>Due</th><th>Owner</th></tr>
    ${ps.map(p=>`<tr><td><b>${esc(p.title)}</b>${p.summary?`<br><span style="font-size:10.5px;color:#555">${esc(p.summary.slice(0,110))}</span>`:""}</td><td>${esc(p.category||"Other")}</td><td>${esc(p.status)}${p.status==="Stuck — Vendor"?" ⚑":""}</td><td>${fmtD(p.due)}${projOverdue(p)?" <b>(OVERDUE)</b>":""}</td><td>${esc(p.owner||"—")}</td></tr>`).join("")}</table>`;
  });
  html+=`<div class="sigline">Prepared by: ${esc(SETTINGS.preparedBy)}</div><div class="disc">${esc(DISCLAIMER)}</div>`;
  printDoc(html,"Project status report");
}

  if(crit.length){html+=`<h2>Top Open Risks</h2>${crit.slice(0,10).map(r=>{const h=hospOf(r.id);return `<p style="margin:4px 0"><b>${esc(r.severity.toUpperCase())}</b> — ${h?esc(h.code)+": ":""}${esc(r.title)}</p>`}).join("")}`}
  const od=openProjects().filter(projOverdue);

  html+=`<div class="sigline">Prepared by: ${esc(SETTINGS.preparedBy)}</div><div class="disc">${esc(DISCLAIMER)}</div>`;
  printDoc(html,"Portfolio executive summary");
}

/* ---------- Action / Vendor / Invoice reports ---------- */
function printActionReport(){
  let html=repHead("Open Action Item Report",null);
  html+=`<table><tr><th>Action</th><th>Hospital</th><th>Owner</th><th>Due</th><th>Status</th></tr>${DB.actions.filter(a=>a.status==="Open").sort((a,b)=>(a.due||"9999").localeCompare(b.due||"9999")).map(a=>{const h=hospOf(a.id);return `<tr><td>${esc(a.title)}</td><td>${h?esc(h.code):"Portfolio"}</td><td>${esc(a.owner||"—")}</td><td>${fmtD(a.due)}${isPast(a.due)?" (OVERDUE)":""}</td><td>${esc(a.status)}</td></tr>`}).join("")}</table>
  <div class="sigline">Prepared by: ${esc(SETTINGS.preparedBy)}</div><div class="disc">${esc(DISCLAIMER)}</div>`;
  printDoc(html,"Action item report");
}
function printVendorReport(){
  let html=repHead("Vendor Follow-Up Report",null);
  DB.vendors.forEach(v=>{
    const acts=linked(v.id,"action").filter(a=>a.status==="Open");
    const invs=openInvs().filter(i=>(i.vendorName||"").toLowerCase()===(v.name||"").toLowerCase()||linked(i.id,"vendor").some(x=>x.id===v.id));
    const pjs=linked(v.id,"project").filter(p=>p.status==="Stuck — Vendor");
    if(!acts.length&&!invs.length&&!pjs.length)return;
    html+=`<h2>${esc(v.name)}</h2>`;
    pjs.forEach(p=>{const h=hospOf(p.id);html+=`<p style="margin:3px 0">⚑ Project stuck on this vendor: <b>${esc(p.title)}</b>${h?" ("+esc(h.code)+")":""}.</p>`});
    acts.forEach(a=>{html+=`<p style="margin:3px 0">➤ ${esc(a.title)}. Due ${fmtD(a.due)}. Owner ${esc(a.owner||"—")}.</p>`});
    if(invs.length)html+=`<p style="margin:3px 0">⌸ ${invs.length} open invoice(s) totaling ${fmt$(invs.reduce((s,i)=>s+(i.amount||0),0))}.</p>`;
  });
  html+=`<h2>Past-Due Invoices</h2><table><tr><th>Vendor</th><th>Invoice</th><th>Amount</th><th>Due</th><th>Hospital</th></tr>${openInvs().filter(i=>isPast(i.dueDate)).map(i=>{const h=hospOf(i.id);return `<tr><td>${esc(i.vendorName||"")}</td><td>#${esc(i.number||"")}</td><td>${fmt$(i.amount)}</td><td>${fmtD(i.dueDate)}</td><td>${h?esc(h.code):""}</td></tr>`}).join("")}</table>
  <div class="sigline">Prepared by: ${esc(SETTINGS.preparedBy)}</div><div class="disc">${esc(DISCLAIMER)}</div>`;
  printDoc(html,"Vendor follow-up report");
}
function printInvoiceReport(){
  let html=repHead("Past-Due Invoice Report",null);
  const od=openInvs().filter(i=>isPast(i.dueDate)).sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""));
  html+=`<p class="meta">Total exposure: <b>${fmt$(od.reduce((s,i)=>s+(i.amount||0),0))}</b> across ${od.length} invoice(s).</p>
  <table><tr><th>Vendor</th><th>Invoice</th><th>Hospital</th><th>Amount</th><th>Due</th><th>Days Late</th><th>Status</th></tr>
  ${od.map(i=>{const h=hospOf(i.id);return `<tr><td>${esc(i.vendorName||"")}</td><td>#${esc(i.number||"")}</td><td>${h?esc(h.code):""}</td><td>${fmt$(i.amount)}</td><td>${fmtD(i.dueDate)}</td><td>${daysFrom(i.dueDate)}</td><td>${esc(i.status)}</td></tr>`}).join("")}</table>
  <div class="sigline">Prepared by: ${esc(SETTINGS.preparedBy)}</div><div class="disc">${esc(DISCLAIMER)}</div>`;
  printDoc(html,"Past-due invoice report");
}

/* ============================ PORTFOLIO EVALUATION ============================ */
function scoreGrade(s){return s>=90?"A":s>=80?"B":s>=70?"C":s>=60?"D":"F"}
function gradeClass(s){return s>=80?"ok":s>=65?"warn":"crit"}
function hospScore(h){
  let s=100;const reasons=[];
  const ps=byHosp(openProjects(),h.id);
  const od=ps.filter(projOverdue);if(od.length){s-=od.length*8;reasons.push(od.length+" overdue project"+(od.length>1?"s":""))}
  const stuck=ps.filter(p=>p.status==="Stuck — Vendor");if(stuck.length){s-=stuck.length*6;reasons.push(stuck.length+" stuck on a vendor")}

  s=Math.max(0,Math.min(100,Math.round(s)));
  return {score:s,grade:scoreGrade(s),reasons};
}

/* ============================ DUPLICATE DETECTION & MERGE ============================ */
function normTitle(s){return String(s||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim()}
function tokenSet(s){return new Set(normTitle(s).split(" ").filter(w=>w.length>2))}
function simRatio(a,b){const A=tokenSet(a),B=tokenSet(b);if(!A.size||!B.size)return 0;
  let inter=0;A.forEach(w=>{if(B.has(w))inter++});return inter/Math.max(A.size,B.size);}
function findDupes(){
  const pairs=[];
  ["risk","project","vendor"].forEach(t=>{
    const arr=DB[col(t)]||[];
    for(let i=0;i<arr.length;i++)for(let j=i+1;j<arr.length;j++){
      const a=arr[i],b=arr[j];
      const sameHosp=(a.hospitalId||null)===(b.hospitalId||null)||!a.hospitalId||!b.hospitalId;
      if(!sameHosp)continue;
      const A=tokenSet(nameOf(a)),B=tokenSet(nameOf(b));
      if(!A.size||!B.size)continue;
      let inter=0;A.forEach(w=>{if(B.has(w))inter++});
      const coef=inter/Math.min(A.size,B.size); // overlap coefficient
      if(inter>=2&&coef>=0.5)pairs.push({t,a:a.id,b:b.id,sim:Math.round(coef*100)});
    }
  });
  return pairs.sort((x,y)=>y.sim-x.sim);
}
function dupeBanner(){
  const d=findDupes();if(!d.length)return"";
  return `<div class="panel rail-a" style="margin-bottom:14px"><div class="panelhead"><span class="eyebrow am">Possible Duplicates</span><span class="xs mut2 right">${d.length} pair${d.length>1?"s":""} found</span></div>
    ${d.slice(0,6).map(p=>{const a=rec(p.a),b=rec(p.b),h=hospOf(p.a);return `<div class="flexr" style="padding:6px 0;border-bottom:1px solid var(--stroke)"><div class="grow sm"><b>${esc(nameOf(a)).slice(0,40)}</b> <span class="mut2">≈ ${p.sim}% ≈</span> <b>${esc(nameOf(b)).slice(0,40)}</b> <span class="xs mut2">${h?h.code:""}</span></div>
      <button class="btn sm" onclick="reviewMerge('${p.a}','${p.b}')">Review &amp; Merge</button></div>`}).join("")}</div>`;
}
function reviewMerge(idA,idB){
  const a=rec(idA),b=rec(idB);if(!a||!b)return;
  const card=(r,other)=>`<div class="panel tight" style="margin:6px 0"><div class="sm"><b>${esc(nameOf(r))}</b></div>
    <div class="xs mut">${esc((r.summary||r.body||"").slice(0,120))||"no summary"}</div>
    <div class="xs mut2" style="margin-top:3px">${[r.status,r.severity,r.category,r.owner&&("owner "+r.owner),noteCount(r)+" notes",linked(r.id).length+" links","created "+fmtD(r.createdAt)].filter(Boolean).join(" · ")}</div>
    <button class="btn sm primary" style="margin-top:7px" onclick="doMerge('${r.id}','${other}')">Keep this · fold in the other</button></div>`;
  openModal(`<div class="eyebrow am" style="margin-bottom:6px">Merge Duplicates</div>
    <div class="xs mut" style="margin-bottom:8px">Pick the record to keep. The other's notes and connections fold into it, then it's removed. This can't be undone — export a backup first if unsure.</div>
    ${card(a,idB)}${card(b,idA)}`);
}
function doMerge(keepId,dropId){
  const keep=rec(keepId),drop=rec(dropId);if(!keep||!drop)return;
  (drop.noteLog||[]).forEach(n=>{(keep.noteLog=keep.noteLog||[]).push(n)});
  if(!keep.summary&&drop.summary)keep.summary=drop.summary;
  if(!keep.hospitalId&&drop.hospitalId)keep.hospitalId=drop.hospitalId;
  linked(dropId).forEach(o=>addLink(keepId,o.id,"merge"));
  addNote(keepId,"Merged in duplicate: "+nameOf(drop));
  keep.updatedAt=nowISO();
  delRec(dropId);
  closeModal();toast("Merged — kept "+nameOf(keep),"ok");render();
}

function recordScoreSnapshot(){
  DB.meta.scoreHistory=DB.meta.scoreHistory||[];
  const today=todayISO();
  const sites={};DB.hospitals.forEach(h=>sites[h.code]=hospScore(h).score);
  const snap={date:today,portfolio:portfolioScore(),sites};
  const last=DB.meta.scoreHistory[DB.meta.scoreHistory.length-1];
  if(last&&last.date===today){DB.meta.scoreHistory[DB.meta.scoreHistory.length-1]=snap;}
  else DB.meta.scoreHistory.push(snap);
  DB.meta.scoreHistory=DB.meta.scoreHistory.slice(-180); // ~6 months
  saveDB();
}
function siteTrend(code){
  const hist=(DB.meta&&DB.meta.scoreHistory)||[];
  const pts=hist.map(s=>s.sites&&s.sites[code]).filter(v=>v!=null);
  if(pts.length<2)return null;
  return {delta:pts[pts.length-1]-pts[0],pts};
}
function trendArrow(code){
  const t=siteTrend(code);if(!t)return"";
  if(t.delta>=4)return ' <span style="color:var(--ok)">▲'+t.delta+'</span>';
  if(t.delta<=-4)return ' <span style="color:var(--crit)">▼'+Math.abs(t.delta)+'</span>';
  return ' <span class="mut2">▬</span>';
}
function sparkline(pts,w=120,h=26){
  if(!pts||pts.length<2)return"";
  const min=Math.min(...pts,0),max=Math.max(...pts,100),rng=max-min||1;
  const step=w/(pts.length-1);
  const d=pts.map((p,i)=>(i?"L":"M")+(i*step).toFixed(1)+","+(h-((p-min)/rng)*h).toFixed(1)).join(" ");
  const last=pts[pts.length-1],col=last>=80?"var(--ok)":last>=65?"var(--amber)":"var(--crit)";
  return `<svg width="${w}" height="${h}" style="vertical-align:middle"><path d="${d}" fill="none" stroke="${col}" stroke-width="2"/></svg>`;
}
function portfolioTrendPanel(){
  const hist=(DB.meta&&DB.meta.scoreHistory)||[];
  if(hist.length<2)return `<div class="panel tight"><div class="xs mut2">Portfolio trend builds as the days pass — your score is being logged once a day. Come back tomorrow to see the line.</div></div>`;
  const pts=hist.map(s=>s.portfolio);const delta=pts[pts.length-1]-pts[0];
  return `<div class="panel tight"><div class="panelhead"><span class="eyebrow am">Portfolio Trend</span><span class="xs mut2 right">${hist.length} days · ${delta>=0?"+":""}${delta} pts</span></div>
    <div class="flexr">${sparkline(pts,260,40)}<span class="sm ${delta>=0?"":""}" style="color:${delta>=0?"var(--ok)":"var(--crit)"}">${delta>=0?"▲ improving":"▼ slipping"}</span></div></div>`;
}

async function syncInbox(){
  if(Store.env!=="cloud"){toast("Connect Cloud Sync first — the inbox arrives through the cloud","am");return}
  const note=aiUnavailableNote();if(note){toast(note,"am");return}
  let queue;
  try{queue=await CLOUD.kv("GET","wuos:inbox")}catch(e){toast(e.message,"err");return}
  if(!Array.isArray(queue)||!queue.length){toast("No new forwarded emails waiting","ok");return}
  toast("Pulling "+queue.length+" forwarded email(s)…");
  let done=0;const ids=[];
  for(const m of queue){
    const text="From: "+(m.from||"")+"\nSubject: "+(m.subject||"")+"\n\n"+(m.text||"").slice(0,14000);
    try{
      const ex=await extractFromContent([{type:"text",text}],m.subject||"forwarded email");
      const anchor=applyExtraction(ex,{text},m.subject||"Forwarded email","email");
      ids.push(anchor.id);done++;
    }catch(e){/* skip the bad one, keep going */}
  }
  try{await CLOUD.kv("SET","wuos:inbox",[])}catch(e){}
  audit("inbox",null,null,"Pulled "+done+" forwarded email(s)","ai");
  toast("Ingested "+done+" forwarded email(s) — triaging…","ok");
  // auto-triage the new arrivals
  if(ids.length)await triageInbox();
  render();
}

  if(name==="risks")return DB.risks.filter(r=>r.status==="Open"&&r.severity==="critical").length;
  if(name==="matrix")return openProjects().filter(p=>p.status==="Stuck — Vendor").length;
  if(name==="radar")return openProjects().filter(p=>projHeatBand(p)===0).length;
  if(name==="triage")return DB.emails.filter(e=>!e.triage).length;return 0;
}
function renderNav(){
  $("#nav").innerHTML=NAV.map(([sec,items])=>`<div class="navsec">${sec}</div>`+items.map(([n,ic,l])=>{const b=navBadge(n);
    return `<div class="navitem ${ROUTE.name===n||(n==="matrix"&&ROUTE.name==="warroom")?"active":""}" onclick="go('#/${n}')"><span class="ni">${ic}</span>${l}<span class="badge ${b?"":"zero"}">${b}</span></div>`}).join("")).join("");
}
function openMenu(){$("#side").classList.add("open");$("#sideveil").classList.add("open")}
function closeMenu(){$("#side").classList.remove("open");$("#sideveil").classList.remove("open")}
function go(hash){closeMenu();if(location.hash===hash)render();else location.hash=hash}
function parseRoute(){
  const p=(location.hash||"#/dashboard").slice(2).split("/");
  if(p[0]==="e")ROUTE={name:"entity",type:p[1],id:p[2],tab:ROUTE.type===p[1]&&ROUTE.id===p[2]?ROUTE.tab:"overview"};
  else if((p[0]==="matrix"||p[0]==="tjc")&&p[1])ROUTE={name:"warroom",id:p[1]};
  else if(p[0]==="radar"&&p[1])ROUTE={name:"radar",id:p[1]};
  else if(p[0]==="tjc")ROUTE={name:"matrix"};
  else if(p[0]==="workorders")ROUTE={name:"projects"};
  else ROUTE={name:p[0]||"dashboard"};
}
function render(){
  const v=ROUTE.name==="entity"?Views.entity(ROUTE.type,ROUTE.id):ROUTE.name==="warroom"?Views.warroom(ROUTE.id):ROUTE.name==="radar"?Views.radar(ROUTE.id):(Views[ROUTE.name]||Views.dashboard)();
  $("#main").innerHTML=v;renderNav();cloudChip();postRender();window.scrollTo(0,0);$("#main").scrollTop=0;
}
function postRender(){
  if(ROUTE.name==="ingest"){
    const dz=$("#dropzone"),fi=$("#filein");if(!dz)return;
    dz.onclick=()=>fi.click();fi.onchange=()=>ingestFiles([...fi.files]);
    ["dragover","dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.toggle("over",ev==="dragover");if(ev==="drop")ingestFiles([...e.dataTransfer.files])}));
  }
  if(ROUTE.name==="graph")setTimeout(drawGraph,40);
  if(ROUTE.name==="brain"){const b=$("#brainin");if(b)b.onkeydown=e=>{if(e.key==="Enter")askBrain()};renderBrainLog()}
  if(ROUTE.name==="settings")renderAudit();
}
async function boot(){
  SETTINGS=Object.assign(defSettings(),await Store.get(SET_KEY)||{});
  DB=await Store.get(DB_KEY);AUDIT=await Store.get(AUDIT_KEY)||[];
  if(!DB||!DB.hospitals){DB=blankDB();seed();await Store.set(DB_KEY,DB);await Store.set(AUDIT_KEY,AUDIT)}
  migrate();
  recordScoreSnapshot();
  CLOUD.url=SETTINGS.cloudUrl||"";CLOUD.key=SETTINGS.cloudKey||"";CLOUD.email=SETTINGS.cloudEmail||"";
  try{const s=JSON.parse(localStorage.getItem("wuos:sess")||"null");
    if(s&&s.t){CLOUD.url=s.url||CLOUD.url;CLOUD.key=s.key||CLOUD.key;CLOUD.token=s.t;CLOUD.refresh=s.r||"";CLOUD.email=s.e||CLOUD.email;CLOUD.userId=s.u||"";
      if(CLOUD.configured()){Store.env="cloud";CLOUD.refreshToken().then(()=>{cloudChip()}).catch(()=>{});}}}catch(e){}
  parseRoute();render();
  window.addEventListener("hashchange",()=>{parseRoute();render()});
  $("#gsearchinput").addEventListener("click",openSearch);
  $("#sinput").addEventListener("input",debounce(renderSearch,120));
  $("#sinput").addEventListener("keydown",e=>{if(e.key==="Enter"){const f=$("#sres .srow");if(f)f.click()}if(e.key==="Escape")closeSearch()});
  document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openSearch()}if(e.key==="Escape"){closeSearch();closeModal()}});
  $("#sov").addEventListener("click",e=>{if(e.target.id==="sov")closeSearch()});
  $("#modalveil").addEventListener("click",e=>{if(e.target.id==="modalveil")closeModal()});
  $("#micbtn").onclick=toggleMic;$("#briefbtn").onclick=runBriefing;
  toast("Universe online · "+(Store.env==="cloud"?"cloud sync":Store.env==="claude"?"Claude persistent storage":"local memory"),"ok");
  if(purgeCompliance.lastCount){toast("Cleared "+purgeCompliance.lastCount+" compliance item(s) from memory","am");purgeCompliance.lastCount=0}
  if(reconcileLinks.lastCount){toast("Linked "+reconcileLinks.lastCount+" record(s) into the knowledge graph","ok");reconcileLinks.lastCount=0}
}
boot();
</script>
</body>
